name: 'Ensure Release Exists'
description: 'Asserts that a GitHub release with the given version exists; fails the step if it does not. Use as a fail-fast guard.'
author: 'Optivem'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  version:
    description: 'Release version to require (e.g., v1.0.0-rc.1, v1.0.0)'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Ensure Release Exists
      id: check-release
      run: |
        $scriptPath = Join-Path ${{ github.action_path }} "Check-VersionReleaseExists.ps1"
        & $scriptPath -Version "${{ inputs.version }}" -Repository "${{ github.repository }}" -GithubToken "${{ inputs.github-token }}"
      shell: pwsh
      env:
        GH_TOKEN: ${{ inputs.github-token }}