name: 'Promote Prerelease'
description: 'Records a prerelease lifecycle event (deployment or signoff) in an environment by creating a status release (e.g. v1.0.0-rc.1-qa-approved)'

inputs:
  version:
    description: 'The prerelease version being acted on (e.g., v1.0.0-rc.1)'
    required: true
  environment:
    description: 'Environment name (e.g., qa, staging, performance) — free-form, caller-defined'
    required: true
  status:
    description: 'Lifecycle status (e.g., approved, rejected, deployed) — free-form, caller-defined'
    required: true
  artifact-urls:
    description: 'JSON array of artifact URLs; meaningful when status records a deployment'
    required: false
    default: '[]'

outputs:
  version:
    description: 'The generated status version (e.g., v1.0.0-rc.1-qa-approved)'
    value: ${{ steps.generate-status-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Generate Status Version
      id: generate-status-version
      uses: optivem/actions/generate-status-version@v1
      with:
        version: ${{ inputs.version }}
        environment: ${{ inputs.environment }}
        status: ${{ inputs.status }}

    - name: Create Status Release
      id: create-release
      uses: optivem/actions/create-github-release@v1
      with:
        base-version: ${{ inputs.version }}
        release-version: ${{ steps.generate-status-version.outputs.version }}
        environment: ${{ inputs.environment }}
        status: ${{ inputs.status }}
        artifact-urls: ${{ inputs.artifact-urls }}
        is-prerelease: true
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
