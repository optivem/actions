name: 'Generate Prerelease Version'
description: 'Generate prerelease version from target version with incrementing RC number'

inputs:
  target-version:
    description: 'Target semantic version from VERSION file (e.g., 1.0.0)'
    required: true
  suffix:
    description: 'Prerelease suffix (e.g., rc, alpha, beta)'
    required: false
    default: 'rc'

outputs:
  version:
    description: 'The prerelease version (e.g., v1.0.0-rc.1)'
    value: ${{ steps.generate.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Generate Prerelease Version
      id: generate
      shell: pwsh
      run: |
        & "${{ github.action_path }}/generate-prerelease-version.ps1" `
          -TargetVersion '${{ inputs.target-version }}' `
          -PrereleaseSuffix '${{ inputs.suffix }}'
