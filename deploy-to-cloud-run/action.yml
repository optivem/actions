name: 'Deploy to Cloud Run'
description: 'Deploy a Docker image to Google Cloud Run. Optionally waits for the service to be ready (controlled by `wait-for-ready`). Caller is responsible for ensuring `image-url` is pushed and reachable before invoking.'
inputs:
  environment:
    description: 'Target deployment environment (e.g., acceptance, qa, production)'
    required: true
  version:
    description: 'Release version to deploy (e.g., v1.0.0-rc.1 or latest)'
    required: true
  image-url:
    description: 'Docker image URL to deploy (e.g., ghcr.io/org/repo/service:tag). Must include a tag or digest.'
    required: true
  project-id:
    description: 'GCP project ID'
    required: true
  region:
    description: 'GCP region for Cloud Run deployment'
    required: false
    default: 'us-central1'
  service-name:
    description: 'Full Cloud Run service name to deploy to (e.g., shop-monolith-java-production). Caller owns the naming convention; the action does not append the environment.'
    required: true
  port:
    description: 'Container port to expose'
    required: false
    default: '8080'
  env-vars:
    description: 'Environment variables to set on the Cloud Run service (KEY=VALUE format, one per line)'
    required: false
    default: ''
  secrets:
    description: 'Secret environment variables to set (KEY=SECRET_NAME:VERSION format, one per line)'
    required: false
    default: ''
  memory:
    description: 'Memory limit for the Cloud Run service'
    required: false
    default: '512Mi'
  cpu:
    description: 'CPU limit for the Cloud Run service'
    required: false
    default: '1'
  min-instances:
    description: 'Minimum number of instances (0 for scale-to-zero)'
    required: false
    default: '0'
  max-instances:
    description: 'Maximum number of instances'
    required: false
    default: '3'
  allow-unauthenticated:
    description: 'Allow unauthenticated (public-internet) access to the service. Secure-by-default: defaults to false. Callers that need a public endpoint (e.g. a frontend or a system that is tested via public URL from another runner) must opt in with "true".'
    required: false
    default: 'false'
  wait-for-ready:
    description: 'Whether to poll the service URL after deploy and fail if it does not become ready. Set to false to publish without verifying readiness (e.g. canary deploys with custom health checks).'
    required: false
    default: 'true'

outputs:
  service-url:
    description: 'The URL of the deployed Cloud Run service'
    value: ${{ steps.deploy.outputs.service-url }}

runs:
  using: 'composite'
  steps:
    - name: Deploy to Cloud Run
      id: deploy
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        VERSION: ${{ inputs.version }}
        IMAGE_URL: ${{ inputs.image-url }}
        PROJECT_ID: ${{ inputs.project-id }}
        REGION: ${{ inputs.region }}
        SERVICE_NAME: ${{ inputs.service-name }}
        PORT: ${{ inputs.port }}
        ENV_VARS: ${{ inputs.env-vars }}
        SECRETS_INPUT: ${{ inputs.secrets }}
        MEMORY: ${{ inputs.memory }}
        CPU: ${{ inputs.cpu }}
        MIN_INSTANCES: ${{ inputs.min-instances }}
        MAX_INSTANCES: ${{ inputs.max-instances }}
        ALLOW_UNAUTH: ${{ inputs.allow-unauthenticated }}
      run: |
        set -euo pipefail

        if [[ ! "$IMAGE_URL" =~ [:@] ]]; then
          echo "::error::image-url must include a tag (image:tag) or digest (image@sha256:...): '$IMAGE_URL'"
          exit 1
        fi

        echo "Deploying $VERSION to Cloud Run service $SERVICE_NAME in $REGION (environment: $ENVIRONMENT)"
        echo "Image: $IMAGE_URL"

        deploy_args=(
          run deploy "$SERVICE_NAME"
          --image="$IMAGE_URL"
          --project="$PROJECT_ID"
          --region="$REGION"
          --port="$PORT"
          --memory="$MEMORY"
          --cpu="$CPU"
          --min-instances="$MIN_INSTANCES"
          --max-instances="$MAX_INSTANCES"
          --platform=managed
          --quiet
        )

        if [[ -n "$ENV_VARS" ]]; then
          env_vars_csv=$(echo "$ENV_VARS" | tr '\n' ',' | sed 's/,$//')
          deploy_args+=(--set-env-vars="$env_vars_csv")
        fi

        if [[ -n "$SECRETS_INPUT" ]]; then
          secrets_csv=$(echo "$SECRETS_INPUT" | tr '\n' ',' | sed 's/,$//')
          deploy_args+=(--set-secrets="$secrets_csv")
        fi

        if [[ "$ALLOW_UNAUTH" == "true" ]]; then
          deploy_args+=(--allow-unauthenticated)
        fi

        gcloud "${deploy_args[@]}"

        SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" \
          --project="$PROJECT_ID" \
          --region="$REGION" \
          --format='value(status.url)')

        echo "service-url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
        echo "Deployed to: $SERVICE_URL"

        {
          echo "### Cloud Run deployment"
          echo
          echo "| Field | Value |"
          echo "| --- | --- |"
          echo "| Service | \`$SERVICE_NAME\` |"
          echo "| Environment | \`$ENVIRONMENT\` |"
          echo "| Version | \`$VERSION\` |"
          echo "| Region | \`$REGION\` |"
          echo "| Image | \`$IMAGE_URL\` |"
          echo "| Service URL | $SERVICE_URL |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Wait for Service to be Ready
      if: inputs.wait-for-ready == 'true'
      uses: optivem/actions/wait-for-urls@v1
      with:
        systems: '[{"name": "Cloud Run service", "url": "${{ steps.deploy.outputs.service-url }}"}]'
