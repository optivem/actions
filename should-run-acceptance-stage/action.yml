name: 'Should Run Acceptance Stage'
description: 'Determines if acceptance stage should run by comparing the latest update timestamp of the subject under test against the last successful run of the target workflow.'
author: 'Optivem'
branding:
  icon: 'check-circle'
  color: 'green'
inputs:
  last-updated-at:
    description: 'Timestamp (ISO 8601) of the latest change to the subject being checked — e.g. Docker image creation time, or the latest commit timestamp of a source repo.'
    required: false
    default: ''
  latest-image-timestamp:
    description: 'DEPRECATED — use last-updated-at. Kept as an alias for backwards compatibility.'
    required: false
    default: ''
  acceptance-stage-repo-owner:
    description: 'Repository owner (organization or username)'
    required: false
    default: ${{ github.repository_owner }}
  acceptance-stage-repo-name:
    description: 'Repository name'
    required: false
    default: ${{ github.event.repository.name }}
  workflow-name:
    description: 'Name of the workflow to check last successful run against'
    required: true
outputs:
  should-run:
    description: 'Whether the acceptance stage should run (true/false)'
    value: ${{ steps.check.outputs.should-run }}
runs:
  using: 'composite'
  steps:
    - name: Check if acceptance stage should run
      id: check
      shell: pwsh
      run: |
        & "${{ github.action_path }}/action.ps1" `
          -RepoOwner "${{ inputs.acceptance-stage-repo-owner }}" `
          -RepoName "${{ inputs.acceptance-stage-repo-name }}" `
          -WorkflowName "${{ inputs.workflow-name }}"
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_SHA: ${{ github.sha }}
        LAST_UPDATED_AT: ${{ inputs.last-updated-at }}
        LATEST_IMAGE_TIMESTAMP: ${{ inputs.latest-image-timestamp }}