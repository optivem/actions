name: 'Simulate Deployment'
description: '[Deprecated] Use deploy-to-docker instead. Wrapper for backward compatibility.'
inputs:
  environment:
    description: 'Target deployment environment (e.g., qa, staging, production)'
    required: true
  version:
    description: 'Release version to deploy (e.g., v1.0.0-rc.1)'
    required: true
  image-urls:
    description: 'Docker image URLs to deploy (JSON array format)'
    required: true
  compose-file:
    description: 'Docker Compose file to use (e.g., docker-compose.yml)'
    required: false
    default: ''
  system-url:
    description: 'Health check URL to wait for (e.g., http://localhost:8080/). Use this for a single system.'
    required: false
    default: ''
  systems:
    description: 'JSON array of systems to health check, each with name and url (e.g., [{"name": "API", "url": "http://localhost:8080/health"}]). Use this for multiple systems.'
    required: false
    default: ''
  working-directory:
    description: 'Working directory containing the Docker Compose file'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Deploy to Docker (via deprecated simulate-deployment)
      uses: optivem/actions/deploy-to-docker@v1
      with:
        environment: ${{ inputs.environment }}
        version: ${{ inputs.version }}
        image-urls: ${{ inputs.image-urls }}
        compose-file: ${{ inputs.compose-file }}
        system-url: ${{ inputs.system-url }}
        systems: ${{ inputs.systems }}
        working-directory: ${{ inputs.working-directory }}
