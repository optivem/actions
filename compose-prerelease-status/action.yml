name: 'Compose Prerelease Status'
description: 'Composes a status-marker tag from a prerelease version by appending environment and status (e.g., v1.0.0-rc.1 + qa + deployed → v1.0.0-rc.1-qa-deployed). Used to tag RCs as they cross pipeline gates. Output is a git tag, not a SemVer version.'
author: 'Optivem'
branding:
  icon: 'tag'
  color: 'blue'

inputs:
  prerelease-version:
    description: 'Prerelease version to build from (e.g., v1.0.0-rc.1)'
    required: true
  environment:
    description: 'Environment name (e.g., qa, staging, prod)'
    required: true
  status:
    description: 'Status marker. Must be one of: deployed, passed, failed, approved, rejected.'
    required: true

outputs:
  status-tag:
    description: 'Composed status-marker tag string (e.g., v1.0.0-rc.1-qa-deployed). Not a SemVer version — a git tag marker for pipeline gates.'
    value: ${{ steps.build.outputs.status-tag }}

runs:
  using: 'composite'
  steps:
    - name: Compose Prerelease Status
      id: build
      shell: bash
      env:
        PRERELEASE_VERSION: ${{ inputs.prerelease-version }}
        ENVIRONMENT: ${{ inputs.environment }}
        STATUS: ${{ inputs.status }}
      run: |
        set -euo pipefail

        trim() {
          local s="$1"
          s="${s#"${s%%[![:space:]]*}"}"
          s="${s%"${s##*[![:space:]]}"}"
          printf '%s' "$s"
        }

        pv=$(trim "${PRERELEASE_VERSION:-}")
        env=$(trim "${ENVIRONMENT:-}")
        st=$(trim "${STATUS:-}")

        if [[ -z "$pv" ]]; then
          echo "::error::prerelease-version cannot be null or empty"
          exit 1
        fi
        if [[ -z "$env" ]]; then
          echo "::error::environment cannot be null or empty"
          exit 1
        fi
        if [[ -z "$st" ]]; then
          echo "::error::status cannot be null or empty"
          exit 1
        fi

        case "$st" in
          deployed|passed|failed|approved|rejected) ;;
          *)
            echo "::error::status must be one of: deployed, passed, failed, approved, rejected (got '$st')"
            exit 1
            ;;
        esac

        status_tag="${pv}-${env}-${st}"

        echo "=== Compose Prerelease Status Action ==="
        echo "Prerelease version: $pv"
        echo "Environment: $env"
        echo "Status: $st"
        echo "Composed tag: $status_tag"
        echo "========================================"

        echo "status-tag=$status_tag" >> "$GITHUB_OUTPUT"
