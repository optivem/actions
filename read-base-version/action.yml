name: 'Read Base Version'
description: 'Reads the base semantic version (MAJOR.MINOR.PATCH) from a VERSION file'

inputs:
  file:
    description: 'Path to the VERSION file'
    required: false
    default: 'VERSION'

outputs:
  base-version:
    description: 'The base semantic version (e.g., 1.0.0)'
    value: ${{ steps.read.outputs.base-version }}

runs:
  using: 'composite'
  steps:
    - name: Read Base Version
      id: read
      shell: bash
      env:
        VERSION_FILE: ${{ inputs.file }}
      run: bash "$GITHUB_ACTION_PATH/read.sh"
