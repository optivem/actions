name: 'Read Base Version'
description: 'Reads the base semantic version (MAJOR.MINOR.PATCH) from a VERSION file'

inputs:
  file:
    description: 'Path to the VERSION file'
    required: false
    default: 'VERSION'

outputs:
  base-version:
    description: 'The base semantic version (e.g., 1.0.0)'
    value: ${{ steps.read.outputs.base-version }}

runs:
  using: 'composite'
  steps:
    - name: Read Base Version
      id: read
      shell: bash
      env:
        VERSION_FILE: ${{ inputs.file }}
      run: |
        if [ ! -f "$VERSION_FILE" ]; then
          echo "::error::VERSION file not found at '$VERSION_FILE'. Make sure to include the VERSION file in your repository."
          exit 1
        fi
        base_version=$(head -n 1 "$VERSION_FILE" | tr -d '[:space:]')
        echo "base-version=$base_version" >> "$GITHUB_OUTPUT"
