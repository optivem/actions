name: 'Tag Docker Image (Local)'
description: 'Applies one or more registry-qualified tags to an already-built local Docker image. Pure local operation — no network, no registry authentication, no push. Each output URL has shape {registry}/{namespace}/{image-name}:{tag}.'
author: 'Optivem'
branding:
  icon: 'tag'
  color: 'blue'

inputs:
  source:
    description: 'Local Docker image reference to tag from (e.g., monolith-system-java:abc123). Typically the `local-image-ref` output of `build-docker-image`.'
    required: true
  registry:
    description: 'Container registry URL used to compose tagged URLs. No network call; only string composition.'
    required: false
    default: 'ghcr.io'
  namespace:
    description: 'Namespace/organization portion of the image URL'
    required: false
    default: '${{ github.repository }}'
  image-name:
    description: 'Image name embedded in the tagged URL'
    required: true
  tags:
    description: 'Tag values to apply, one per line. Each becomes {registry}/{namespace}/{image-name}:{tag}.'
    required: true

outputs:
  image-urls:
    description: 'JSON array of full tagged image URLs, in the same order as the input tags. Use `fromJSON(...)[N]` to read individual tags.'
    value: ${{ steps.tag.outputs.image-urls }}

runs:
  using: 'composite'
  steps:
    - id: tag
      shell: bash
      env:
        SOURCE: ${{ inputs.source }}
        REGISTRY: ${{ inputs.registry }}
        NAMESPACE: ${{ inputs.namespace }}
        IMAGE_NAME: ${{ inputs.image-name }}
        TAGS: ${{ inputs.tags }}
      run: |
        BASE="${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}"
        urls=()
        while IFS= read -r tag; do
          tag="$(echo "$tag" | xargs)"
          [ -z "$tag" ] && continue
          URL="${BASE}:${tag}"
          docker tag "$SOURCE" "$URL"
          echo "🏷️  $SOURCE → $URL"
          urls+=("$URL")
        done <<< "$TAGS"

        json="["
        for i in "${!urls[@]}"; do
          [ "$i" -gt 0 ] && json+=","
          json+="\"${urls[$i]}\""
        done
        json+="]"
        echo "image-urls=$json" >> "$GITHUB_OUTPUT"
