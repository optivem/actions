name: 'Bump Patch Versions'
description: 'Finds VERSION files where the final release tag already exists and bumps the patch version. Commits changes via the GitHub Contents API with SHA precondition (no git push), making it race-safe against concurrent main-branch writes.'

inputs:
  version-files:
    description: 'Newline-separated list of "path:tag-prefix1,tag-prefix2,..." entries. Each VERSION file is bumped if ANY tag "{prefix}{current-version}" exists on the remote. Example: "VERSION:meta-v,monolith-java-v"'
    required: true
  branch:
    description: 'Branch to update (default: main)'
    required: false
    default: 'main'
  github-token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}

outputs:
  bumped:
    description: 'Whether any versions were bumped (true or false)'
    value: ${{ steps.bump.outputs.bumped }}
  summary:
    description: 'Summary of bumped versions'
    value: ${{ steps.bump.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Bump Patch Versions (API + SHA lock)
      id: bump
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ inputs.branch }}
      run: |
        set -euo pipefail

        bumped=false
        summary=""

        while IFS= read -r entry; do
          [[ -z "$entry" ]] && continue

          if [[ "$entry" != *:* ]]; then
            echo "::error::Invalid version-files entry: '$entry'. Expected 'path:tag-prefix[,tag-prefix...]' format (e.g. 'VERSION:meta-v,monolith-java-v')."
            exit 1
          fi
          file="${entry%%:*}"
          tag_prefixes_csv="${entry#*:}"
          if [[ -z "$file" || -z "$tag_prefixes_csv" ]]; then
            echo "::error::Invalid version-files entry: '$entry'. Both path and at least one tag-prefix are required."
            exit 1
          fi
          IFS=',' read -ra tag_prefixes <<< "$tag_prefixes_csv"

          # Fetch file metadata via Contents API (gets current content + blob SHA)
          if ! response=$(gh api "repos/${REPO}/contents/${file}?ref=${BRANCH}" 2>/dev/null); then
            echo "::warning::VERSION file not found via API: $file"
            continue
          fi

          file_sha=$(echo "$response" | jq -r '.sha')
          current_b64=$(echo "$response" | jq -r '.content' | tr -d '\n')
          current_version=$(echo "$current_b64" | base64 -d | tr -d '[:space:]')

          # Bump if ANY of the configured release tags exists on the remote
          matched_tag=""
          for prefix in "${tag_prefixes[@]}"; do
            candidate="${prefix}${current_version}"
            if git ls-remote --tags --exit-code origin "refs/tags/${candidate}" >/dev/null 2>&1; then
              matched_tag="$candidate"
              break
            fi
          done
          if [[ -z "$matched_tag" ]]; then
            echo "Skipped $file: $current_version (no matching release tag exists on remote for prefixes: ${tag_prefixes_csv})"
            continue
          fi
          release_tag="$matched_tag"

          major=$(echo "$current_version" | cut -d. -f1)
          minor=$(echo "$current_version" | cut -d. -f2)
          patch=$(echo "$current_version" | cut -d. -f3)
          new_version="${major}.${minor}.$((patch + 1))"
          new_content_b64=$(printf '%s\n' "$new_version" | base64 -w0)

          # Retry loop for 409 Conflict (SHA precondition failed = concurrent write)
          attempt=0
          max_attempts=5
          while [[ $attempt -lt $max_attempts ]]; do
            attempt=$((attempt + 1))

            if gh api --method PUT "repos/${REPO}/contents/${file}" \
                -f message="Bump $file to $new_version (post-release of $release_tag)" \
                -f content="${new_content_b64}" \
                -f sha="${file_sha}" \
                -f branch="${BRANCH}" >/dev/null 2>&1; then
              echo "Bumped $file: $current_version -> $new_version"
              summary="${summary}${file}: ${current_version} -> ${new_version}\n"
              bumped=true
              break
            fi

            # Refresh state — either another run bumped it (converged) or we retry with fresh SHA
            response=$(gh api "repos/${REPO}/contents/${file}?ref=${BRANCH}")
            file_sha=$(echo "$response" | jq -r '.sha')
            current_b64=$(echo "$response" | jq -r '.content' | tr -d '\n')
            current_version_now=$(echo "$current_b64" | base64 -d | tr -d '[:space:]')

            if [[ "$current_version_now" == "$new_version" ]]; then
              echo "Converged: $file is now $new_version (concurrent writer finished first)"
              break
            fi
            if [[ "$current_version_now" != "$current_version" ]]; then
              echo "::warning::$file changed to $current_version_now during bump; skipping"
              break
            fi
            echo "Retry $attempt/$max_attempts for $file..."
          done

          if [[ $attempt -eq $max_attempts ]]; then
            echo "::error::Exhausted retries bumping $file"
            exit 1
          fi
        done <<< "${{ inputs.version-files }}"

        echo "bumped=$bumped" >> "$GITHUB_OUTPUT"
        echo "summary<<EOF" >> "$GITHUB_OUTPUT"
        echo -e "$summary" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
