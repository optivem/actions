name: 'Bump Patch Versions'
description: 'Computes patch-version bumps for VERSION files whose matching release signal already exists. Each VERSION file declares a signal source (git-tag or ghcr-image) and a value — the bump fires when the corresponding artifact exists for the current version. Reads files from the checked-out workspace; writes nothing. Pair with commit-files to persist the bumps.'

inputs:
  version-files:
    description: |
      JSON array of {"path": string, "signal": "git-tag"|"ghcr-image", "value": string} objects.
        - signal="git-tag": bump if a git tag exists at "{value}{current-version}" on the remote (e.g. value="meta-v" + version="1.0.40" -> probes tag "meta-v1.0.40" via `git ls-remote`).
        - signal="ghcr-image": bump if a GHCR image exists at "{value}:v{current-version}" (e.g. value="ghcr.io/optivem/shop/multitier-backend-java" + version="1.5.24" -> probes that image:v1.5.24).
    required: true
  repository:
    description: 'Repository in owner/repo format (used for git-tag probes). Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'Token for git remote auth and GHCR auth. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  bumps:
    description: 'JSON array of {path, old-version, new-version, release-signal} for files that need bumping. release-signal is the concrete artifact reference (tag name or image:tag).'
    value: ${{ steps.bump.outputs.bumps }}
  bumped:
    description: 'true if at least one file needs bumping'
    value: ${{ steps.bump.outputs.bumped }}
  summary:
    description: 'Human-readable summary (one line per file, bumped or skipped)'
    value: ${{ steps.bump.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Bump Patch Versions (compute)
      id: bump
      shell: bash
      env:
        VERSION_FILES: ${{ inputs.version-files }}
        REPOSITORY: ${{ inputs.repository }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        source "$GITHUB_ACTION_PATH/../shared/remote-url.sh"
        source "$GITHUB_ACTION_PATH/../shared/ghcr-probe.sh"

        if ! jq -e 'type == "array"' >/dev/null <<<"$VERSION_FILES"; then
          echo "::error::version-files must be a JSON array of {path, signal, value} objects"
          exit 1
        fi

        # --- signal probes -----------------------------------------------------

        probe_git_tag() {
          local tag=$1
          local remote_url
          remote_url=$(remote_query_url "$GH_TOKEN" "github.com" "$REPOSITORY")
          local output
          if ! output=$(git ls-remote --tags "$remote_url" "refs/tags/${tag}" 2>/dev/null); then
            echo "::error::Failed to query tags from ${REPOSITORY}" >&2
            exit 1
          fi
          if [ -n "$output" ]; then
            echo "true"
          else
            echo "false"
          fi
        }

        probe_ghcr_image() {
          local image_url=$1
          local tag=$2
          local path=${image_url#ghcr.io/}
          local manifest_url="https://ghcr.io/v2/${path}/manifests/${tag}"
          local bearer
          bearer=$(ghcr_bearer_for "$path" "$GH_TOKEN" || true)
          if [ -z "$bearer" ]; then
            echo "::error::Failed to obtain GHCR token for $path" >&2
            exit 1
          fi
          local code
          code=$(ghcr_probe_manifest "$manifest_url" "$bearer")
          case "$code" in
            200) echo "true"; return ;;
            404) echo "false"; return ;;
            401|403)
              echo "::error::Authentication failed probing ${image_url}:${tag} (HTTP $code)" >&2
              exit 1
              ;;
          esac
          echo "::error::Unexpected HTTP $code probing ${image_url}:${tag} after retries" >&2
          exit 1
        }

        # --- main loop ---------------------------------------------------------

        bumps='[]'
        bumped=false
        summary=""

        while IFS= read -r entry; do
          path=$(jq -r '.path // empty' <<<"$entry")
          signal=$(jq -r '.signal // empty' <<<"$entry")
          value=$(jq -r '.value // empty' <<<"$entry")

          if [ -z "$path" ] || [ -z "$signal" ] || [ -z "$value" ]; then
            echo "::error::Each entry must have non-empty 'path', 'signal', and 'value' fields. Got: $entry"
            exit 1
          fi

          if [[ ! -f "$path" ]]; then
            echo "::warning::VERSION file not found: $path"
            continue
          fi
          current_version=$(tr -d '[:space:]' < "$path")
          if [[ -z "$current_version" ]]; then
            echo "::warning::VERSION file is empty: $path"
            continue
          fi

          case "$signal" in
            git-tag)
              release_signal="${value}${current_version}"
              exists=$(probe_git_tag "$release_signal")
              ;;
            ghcr-image)
              image_tag="v${current_version}"
              release_signal="${value}:${image_tag}"
              exists=$(probe_ghcr_image "$value" "$image_tag")
              ;;
            *)
              echo "::error::Unknown signal '$signal' for $path. Expected 'git-tag' or 'ghcr-image'."
              exit 1
              ;;
          esac

          if [[ "$exists" != "true" ]]; then
            echo "Skipped $path: $current_version (no artifact at $release_signal)"
            summary="${summary}${path}: skipped (no artifact for $current_version)\n"
            continue
          fi

          major=$(cut -d. -f1 <<<"$current_version")
          minor=$(cut -d. -f2 <<<"$current_version")
          patch=$(cut -d. -f3 <<<"$current_version")
          new_version="${major}.${minor}.$((patch + 1))"

          bumps=$(jq -c --arg p "$path" --arg ov "$current_version" --arg nv "$new_version" --arg rs "$release_signal" \
            '. + [{path: $p, "old-version": $ov, "new-version": $nv, "release-signal": $rs}]' <<<"$bumps")

          echo "Planned bump: $path $current_version -> $new_version (artifact $release_signal)"
          summary="${summary}${path}: ${current_version} -> ${new_version}\n"
          bumped=true
        done < <(jq -c '.[]' <<<"$VERSION_FILES")

        {
          echo "bumps=$bumps"
          echo "bumped=$bumped"
          echo "summary<<EOF"
          echo -e "$summary"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
