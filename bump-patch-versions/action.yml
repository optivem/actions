name: 'Bump Patch Versions'
description: 'Computes patch-version bumps for VERSION files whose matching git tag already exists. Each entry declares a tag-prefix `value`; the bump fires when `{value}{current-version}` exists on the remote. Reads files from the checked-out workspace; writes nothing. Pair with commit-files to persist the bumps.'

inputs:
  version-files:
    description: |
      JSON array of {"path": string, "value": string} objects. The `value` is a
      tag prefix; the action probes "{value}{current-version}" via
      `git ls-remote` and bumps the file's patch component when the tag exists.
      Example: value="meta-v" + version="1.0.40" -> probes tag "meta-v1.0.40".
      A legacy `"signal": "git-tag"` field is accepted and ignored for backward
      compatibility with already-scaffolded student repos.
    required: true
  repository:
    description: 'Repository in owner/repo format (used for tag probes). Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'Token for git remote auth. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  bumps:
    description: 'JSON array of {path, old-version, new-version, release-signal} for files that need bumping. release-signal is the matched tag name.'
    value: ${{ steps.bump.outputs.bumps }}
  bumped:
    description: 'true if at least one file needs bumping'
    value: ${{ steps.bump.outputs.bumped }}
  summary:
    description: 'Human-readable summary (one line per file, bumped or skipped)'
    value: ${{ steps.bump.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Bump Patch Versions (compute)
      id: bump
      shell: bash
      env:
        VERSION_FILES: ${{ inputs.version-files }}
        REPOSITORY: ${{ inputs.repository }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        source "$GITHUB_ACTION_PATH/../shared/remote-url.sh"

        if ! jq -e 'type == "array"' >/dev/null <<<"$VERSION_FILES"; then
          echo "::error::version-files must be a JSON array of {path, value} objects"
          exit 1
        fi

        probe_git_tag() {
          local tag=$1
          local remote_url
          remote_url=$(remote_query_url "$GH_TOKEN" "github.com" "$REPOSITORY")
          local output
          if ! output=$(git ls-remote --tags "$remote_url" "refs/tags/${tag}" 2>/dev/null); then
            echo "::error::Failed to query tags from ${REPOSITORY}" >&2
            exit 1
          fi
          if [ -n "$output" ]; then
            echo "true"
          else
            echo "false"
          fi
        }

        bumps='[]'
        bumped=false
        summary=""

        while IFS= read -r entry; do
          path=$(jq -r '.path // empty' <<<"$entry")
          value=$(jq -r '.value // empty' <<<"$entry")
          signal=$(jq -r '.signal // empty' <<<"$entry")

          if [ -z "$path" ] || [ -z "$value" ]; then
            echo "::error::Each entry must have non-empty 'path' and 'value' fields. Got: $entry"
            exit 1
          fi

          # Backward compat: tolerate legacy `signal: git-tag`; reject anything else.
          if [ -n "$signal" ] && [ "$signal" != "git-tag" ]; then
            echo "::error::Legacy 'signal' field for $path must be 'git-tag' (or omitted). Got: '$signal'. The 'ghcr-image' signal has been removed."
            exit 1
          fi

          if [[ ! -f "$path" ]]; then
            echo "::warning::VERSION file not found: $path"
            continue
          fi
          current_version=$(tr -d '[:space:]' < "$path")
          if [[ -z "$current_version" ]]; then
            echo "::warning::VERSION file is empty: $path"
            continue
          fi

          release_signal="${value}${current_version}"
          exists=$(probe_git_tag "$release_signal")

          if [[ "$exists" != "true" ]]; then
            echo "Skipped $path: $current_version (no tag at $release_signal)"
            summary="${summary}${path}: skipped (no tag for $current_version)\n"
            continue
          fi

          major=$(cut -d. -f1 <<<"$current_version")
          minor=$(cut -d. -f2 <<<"$current_version")
          patch=$(cut -d. -f3 <<<"$current_version")
          new_version="${major}.${minor}.$((patch + 1))"

          bumps=$(jq -c --arg p "$path" --arg ov "$current_version" --arg nv "$new_version" --arg rs "$release_signal" \
            '. + [{path: $p, "old-version": $ov, "new-version": $nv, "release-signal": $rs}]' <<<"$bumps")

          echo "Planned bump: $path $current_version -> $new_version (artifact $release_signal)"
          summary="${summary}${path}: ${current_version} -> ${new_version}\n"
          bumped=true
        done < <(jq -c '.[]' <<<"$VERSION_FILES")

        {
          echo "bumps=$bumps"
          echo "bumped=$bumped"
          echo "summary<<EOF"
          echo -e "$summary"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
