name: 'Bump Patch Versions'
description: 'Computes patch-version bumps for VERSION files whose matching release tag already exists on the remote. Reads files from the checked-out workspace; writes nothing. Tool-agnostic — uses git ls-remote, no platform API dependency. Pair with commit-files (or an equivalent for your platform) to persist the bumps.'

inputs:
  version-files:
    description: 'Newline-separated list of "path:tag-prefix1,tag-prefix2,..." entries. Each VERSION file is bumped if ANY tag "{prefix}{current-version}" exists on the remote. Example: "VERSION:meta-v,monolith-java-v"'
    required: true
  repository:
    description: 'Repository in owner/repo format. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  git-host:
    description: 'Git host to query (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'
  token:
    description: 'Token for authenticating to the remote. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  bumps:
    description: 'JSON array of {path, old-version, new-version, release-tag} for files that need bumping'
    value: ${{ steps.bump.outputs.bumps }}
  bumped:
    description: 'true if at least one file needs bumping'
    value: ${{ steps.bump.outputs.bumped }}
  summary:
    description: 'Human-readable summary (one line per file, bumped or skipped)'
    value: ${{ steps.bump.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Bump Patch Versions (compute)
      id: bump
      shell: bash
      env:
        VERSION_FILES: ${{ inputs.version-files }}
        REPO: ${{ inputs.repository }}
        GIT_HOST: ${{ inputs.git-host }}
        TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        source "$GITHUB_ACTION_PATH/../shared/remote-url.sh"

        remote_url=$(remote_query_url "$TOKEN" "$GIT_HOST" "$REPO")

        bumps='[]'
        bumped=false
        summary=""

        while IFS= read -r entry; do
          [[ -z "$entry" ]] && continue

          if [[ "$entry" != *:* ]]; then
            echo "::error::Invalid version-files entry: '$entry'. Expected 'path:tag-prefix[,tag-prefix...]' format (e.g. 'VERSION:meta-v,monolith-java-v')."
            exit 1
          fi
          file="${entry%%:*}"
          tag_prefixes_csv="${entry#*:}"
          if [[ -z "$file" || -z "$tag_prefixes_csv" ]]; then
            echo "::error::Invalid version-files entry: '$entry'. Both path and at least one tag-prefix are required."
            exit 1
          fi
          IFS=',' read -ra tag_prefixes <<< "$tag_prefixes_csv"

          if [[ ! -f "$file" ]]; then
            echo "::warning::VERSION file not found: $file"
            continue
          fi
          current_version=$(cat "$file" | tr -d '[:space:]')

          matched_tag=""
          for prefix in "${tag_prefixes[@]}"; do
            candidate="${prefix}${current_version}"
            if git ls-remote --tags --exit-code "$remote_url" "refs/tags/${candidate}" >/dev/null 2>&1; then
              matched_tag="$candidate"
              break
            fi
          done
          if [[ -z "$matched_tag" ]]; then
            echo "Skipped $file: $current_version (no matching release tag exists on remote for prefixes: ${tag_prefixes_csv})"
            summary="${summary}${file}: skipped (no matching release tag for $current_version)\n"
            continue
          fi

          major=$(echo "$current_version" | cut -d. -f1)
          minor=$(echo "$current_version" | cut -d. -f2)
          patch=$(echo "$current_version" | cut -d. -f3)
          new_version="${major}.${minor}.$((patch + 1))"

          bumps=$(jq -c --arg p "$file" --arg ov "$current_version" --arg nv "$new_version" --arg rt "$matched_tag" \
            '. + [{path: $p, "old-version": $ov, "new-version": $nv, "release-tag": $rt}]' <<< "$bumps")

          echo "Planned bump: $file $current_version -> $new_version (release $matched_tag)"
          summary="${summary}${file}: ${current_version} -> ${new_version}\n"
          bumped=true
        done <<< "$VERSION_FILES"

        echo "bumps=$bumps" >> "$GITHUB_OUTPUT"
        echo "bumped=$bumped" >> "$GITHUB_OUTPUT"
        echo "summary<<EOF" >> "$GITHUB_OUTPUT"
        echo -e "$summary" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
