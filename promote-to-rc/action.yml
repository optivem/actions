name: 'Promote to RC'
description: 'Generates a prerelease version, tags Docker images, and creates a prerelease GitHub release'

inputs:
  target-version:
    description: 'Target semantic version from VERSION file (e.g., 1.0.0)'
    required: true
  image-urls:
    description: 'JSON array of Docker image digest URLs to tag'
    required: true
  prefix:
    description: 'Optional prefix prepended to the tag (e.g., monolith-java). Produces {prefix}-v{version}-rc.{run_number} when set, else v{version}-rc.{run_number}'
    required: false
    default: ''

outputs:
  version:
    description: 'The generated prerelease version (e.g., v1.0.0-rc.42 or monolith-java-v1.0.0-rc.42)'
    value: ${{ steps.generate-version.outputs.version }}
  image-urls:
    description: 'JSON array of Docker image URLs with the prerelease tag applied'
    value: ${{ steps.tag-images.outputs.image-urls }}

runs:
  using: 'composite'
  steps:
    - name: Generate Prerelease Version
      id: generate-version
      uses: optivem/actions/generate-prerelease-version@v1
      with:
        target-version: ${{ inputs.target-version }}
        prefix: ${{ inputs.prefix }}

    - name: Tag Docker Images for Prerelease
      id: tag-images
      uses: optivem/actions/tag-docker-images@v1
      with:
        image-urls: ${{ inputs.image-urls }}
        tag: ${{ steps.generate-version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: Create Prerelease
      id: create-release
      uses: optivem/actions/create-release@v1
      with:
        base-version: latest
        release-version: ${{ steps.generate-version.outputs.version }}
        environment: acceptance
        status: prerelease
        artifact-urls: ${{ steps.tag-images.outputs.image-urls }}
        is-prerelease: true
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
