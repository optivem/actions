name: 'Find Release by Run'
description: 'Finds the GitHub release whose body references a given workflow run ID'
author: 'Optivem'
branding:
  icon: 'search'
  color: 'blue'

inputs:
  run-id:
    description: 'Workflow run ID to match against release descriptions'
    required: true
  repository:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  search-limit:
    description: 'Number of recent releases to scan'
    required: false
    default: '20'
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}

outputs:
  tag:
    description: 'Tag of the matching release'
    value: ${{ steps.find.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - name: Find Release by Run
      id: find
      run: |
        $scriptPath = Join-Path ${{ github.action_path }} "Find-ReleaseByRun.ps1"
        & $scriptPath -RunId "${{ inputs.run-id }}" -Repository "${{ inputs.repository }}" -SearchLimit ${{ inputs.search-limit }} -GithubToken "${{ inputs.github-token }}"
      shell: pwsh
      env:
        GH_TOKEN: ${{ inputs.github-token }}
