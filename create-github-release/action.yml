name: 'Create GitHub Release'
description: 'GitHub-API primitive. Creates or updates (idempotent) a GitHub Release record for a given tag using a pre-composed title and notes file. Preserves asset uploads across re-runs via `gh release edit` when the release already exists.'
author: 'Optivem'
branding:
  icon: 'tag'
  color: 'blue'

inputs:
  tag:
    description: 'Git tag the release is attached to (must already exist on the remote).'
    required: true
  title:
    description: 'Release title.'
    required: true
  notes-file:
    description: 'Path to a file containing the release notes body (markdown).'
    required: true
  is-prerelease:
    description: 'Whether to mark the release as a prerelease.'
    required: false
    default: 'false'
  repository:
    description: 'Repository in owner/repo form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token for release API calls. Defaults to the workflow-scoped GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

outputs:
  release-url:
    description: 'URL of the created or updated GitHub release.'
    value: ${{ steps.create.outputs.release-url }}

runs:
  using: 'composite'
  steps:
    - id: create
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TAG: ${{ inputs.tag }}
        TITLE: ${{ inputs.title }}
        NOTES_FILE: ${{ inputs.notes-file }}
        IS_PRERELEASE: ${{ inputs.is-prerelease }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        prerelease_flag=()
        if [[ "$IS_PRERELEASE" == "true" ]]; then
          prerelease_flag=(--prerelease)
        fi

        if gh_retry release view "$TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
          echo "📝 Release $TAG exists — editing title/notes (preserves assets)..."
          if ! gh_retry release edit "$TAG" \
              --repo "$REPOSITORY" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              "${prerelease_flag[@]}" >/dev/null; then
            echo "::error::Failed to edit existing release $TAG"
            exit 1
          fi
          release_url=$(gh_retry release view "$TAG" --repo "$REPOSITORY" --json url --jq '.url')
          echo "✅ Release updated: $release_url"
        else
          echo "📄 Creating new release $TAG..."
          if ! create_output=$(gh_retry release create "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --repo "$REPOSITORY" \
              "${prerelease_flag[@]}" 2>&1); then
            echo "::error::Failed to create release. gh CLI output: $create_output"
            exit 1
          fi
          release_url=$(echo "$create_output" | tail -n1 | tr -d '[:space:]')
          echo "✅ Release created: $release_url"
        fi

        echo "release-url=$release_url" >> "$GITHUB_OUTPUT"
