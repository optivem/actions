name: 'Promote to QA Signoff'
description: 'Records a QA signoff result by generating a status version and creating a signoff release'

inputs:
  version:
    description: 'The RC version that was tested (e.g., v1.0.4-rc)'
    required: true
  result:
    description: 'QA testing result (success or failure)'
    required: true

outputs:
  version:
    description: 'The generated signoff status version (e.g., v1.0.4-rc-qa-success)'
    value: ${{ steps.generate-status-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Generate Status Version
      id: generate-status-version
      uses: optivem/actions/generate-status-version@v1
      with:
        version: ${{ inputs.version }}
        environment: qa
        status: ${{ inputs.result }}

    - name: Create Signoff Release
      id: create-release
      uses: optivem/actions/create-release@v1
      with:
        base-version: ${{ inputs.version }}
        release-version: ${{ steps.generate-status-version.outputs.version }}
        environment: qa
        status: ${{ inputs.result }}
        is-prerelease: true
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
