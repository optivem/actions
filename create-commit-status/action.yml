name: 'Create Commit Status'
description: 'Creates a commit status record on the current repository (POST /repos/{repo}/statuses/{sha}) — used for CI state or as per-commit metadata'
inputs:
  commit-sha:
    description: 'Commit SHA to attach the status to. Empty = current commit (github.sha).'
    required: false
    default: ''
  context:
    description: 'Status context (label shown on the commit)'
    required: true
  state:
    description: 'Status state: success, failure, pending, or error'
    required: false
    default: 'success'
  description:
    description: 'Short human-readable description (often the subject identifier, e.g. the verified upstream SHA)'
    required: false
    default: ''
  target-url:
    description: 'URL the status links to. Empty = link to the current workflow run.'
    required: false
    default: ''
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        INPUT_SHA: ${{ inputs.commit-sha }}
        CONTEXT: ${{ inputs.context }}
        STATE: ${{ inputs.state }}
        DESCRIPTION: ${{ inputs.description }}
        INPUT_TARGET_URL: ${{ inputs.target-url }}
        DEFAULT_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        COMMIT_SHA: ${{ github.sha }}
      run: |
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"
        SHA="${INPUT_SHA:-$COMMIT_SHA}"
        TARGET_URL="${INPUT_TARGET_URL:-$DEFAULT_TARGET_URL}"
        gh_retry api "repos/${{ github.repository }}/statuses/$SHA" \
          -f state="$STATE" \
          -f context="$CONTEXT" \
          -f description="$DESCRIPTION" \
          -f target_url="$TARGET_URL"
        echo "Recorded status [$CONTEXT=$STATE] on commit $SHA${DESCRIPTION:+ ($DESCRIPTION)}" >> "$GITHUB_STEP_SUMMARY"
