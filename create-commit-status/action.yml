name: 'Create Commit Status'
description: 'Creates a commit status (POST /repos/{repo}/statuses/{sha}) on the commit identified by `ref` (SHA, branch, or tag). Resolves ref to SHA server-side, so callers can pass an rc tag without a local checkout. Used to record verdict gates (e.g. qa/signoff success/failure) on rc commits. Pairs with get-commit-status (read) and check-commit-status-exists (verify).'
inputs:
  ref:
    description: 'Ref (SHA, branch, or tag) to attach the status to. Resolved to a commit SHA via the commits API before the status is written. SHAs pass through unchanged. Empty -> uses the current commit (github.sha).'
    required: false
    default: ''
  context:
    description: 'Status context (label shown on the commit). Use <env>/<verb> convention (e.g. "qa/signoff", "acceptance/tested").'
    required: true
  state:
    description: 'Status state: success, failure, pending, or error'
    required: false
    default: 'success'
  description:
    description: 'Short human-readable description (often the subject identifier, e.g. the verified upstream SHA)'
    required: false
    default: ''
  target-url:
    description: 'URL the status links to. Empty = link to the current workflow run.'
    required: false
    default: ''
  token:
    description: 'GitHub token used for API calls. Needs statuses:write + contents:read (for ref resolution). Defaults to github.token.'
    required: false
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REF: ${{ inputs.ref }}
        CONTEXT: ${{ inputs.context }}
        STATE: ${{ inputs.state }}
        DESCRIPTION: ${{ inputs.description }}
        INPUT_TARGET_URL: ${{ inputs.target-url }}
        DEFAULT_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        DEFAULT_SHA: ${{ github.sha }}
        REPOSITORY: ${{ github.repository }}
      run: bash "$GITHUB_ACTION_PATH/create.sh"
