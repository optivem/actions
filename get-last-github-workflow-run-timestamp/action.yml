name: 'Get Last GitHub Workflow Run Timestamp'
description: 'Returns the createdAt timestamp of the most recent completed run of a given workflow (any conclusion), queried via gh run list. Empty when no previous completed run exists.'

inputs:
  workflow-name:
    description: 'Workflow file name or display name to query (e.g. `github.workflow`).'
    required: true
  repository:
    description: 'Repository in "owner/name" form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  timestamp:
    description: 'ISO 8601 createdAt of the last completed run, regardless of conclusion. Empty if no previous completed run exists.'
    value: ${{ steps.get.outputs.timestamp }}

runs:
  using: 'composite'
  steps:
    - name: Get last workflow run timestamp
      id: get
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        WORKFLOW_NAME: ${{ inputs.workflow-name }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        timestamp=$(gh_retry run list \
          --repo "${REPOSITORY}" \
          --workflow "$WORKFLOW_NAME" \
          --status completed \
          --limit 1 \
          --json createdAt \
          2>/dev/null \
          | jq -r '.[0].createdAt // ""')

        if [[ -z "$timestamp" ]]; then
          echo "No previous completed run found for workflow '$WORKFLOW_NAME'."
        else
          echo "Last completed run: $timestamp"
        fi

        echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"
