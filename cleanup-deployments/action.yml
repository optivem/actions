name: 'Cleanup Deployments'
description: 'Cleans up superseded GitHub deployments that are no longer needed'

inputs:
  keep-count:
    description: 'Per-environment count cap: keep this many newest deployments; anything beyond the cap is deleted. Applies only to non-protected environments and to SHAs not already deployed to a protected env.'
    required: false
    default: '3'
  protected-environments:
    description: 'Comma-separated list of environment name patterns whose deployments must never be deleted. Supports `*` wildcards, case-insensitive (e.g. `*-production,production`).'
    required: false
    default: '*-production,production'
  delete-delay-seconds:
    description: 'Seconds to wait between each API delete call to avoid GitHub rate limiting'
    required: false
    default: '10'
  rate-limit-threshold:
    description: 'Pause before each API delete when remaining core-rate-limit requests fall below this number (set 0 to disable).'
    required: false
    default: '50'
  dry-run:
    description: 'If true, only log what would be deleted without actually deleting anything'
    required: false
    default: 'false'
  token:
    description: 'GitHub token used for deployment API calls. Defaults to the workflow-scoped GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

outputs:
  deleted-count:
    description: 'Number of deployments actually deleted (real mode only; 0 in dry-run).'
    value: ${{ steps.cleanup.outputs.deleted-count }}
  dry-run-count:
    description: 'Number of deployments that would be deleted (dry-run mode only; 0 in real mode).'
    value: ${{ steps.cleanup.outputs.dry-run-count }}

runs:
  using: 'composite'
  steps:
    - name: Cleanup Deployments
      id: cleanup
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        KEEP_COUNT: ${{ inputs.keep-count }}
        PROTECTED_ENVIRONMENTS: ${{ inputs.protected-environments }}
        DELETE_DELAY_SECONDS: ${{ inputs.delete-delay-seconds }}
        RATE_LIMIT_THRESHOLD: ${{ inputs.rate-limit-threshold }}
        DRY_RUN: ${{ inputs.dry-run }}
        REPOSITORY: ${{ github.repository }}
      run: bash "$GITHUB_ACTION_PATH/cleanup-deployments.sh"
