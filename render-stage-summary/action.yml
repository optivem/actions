name: 'Render Stage Summary'
description: 'Rendering engine for stage summaries — emits markdown to $GITHUB_STEP_SUMMARY tailored to stage-result (success/failure/skipped/etc.). Used directly by commit-stage workflows and composed by `render-system-stage-summary` for richer system-stage rendering.'
author: 'Optivem'

branding:
  icon: 'clipboard'
  color: 'blue'

inputs:
  stage-name:
    description: 'Name of the stage being summarized'
    required: true
  stage-result:
    description: 'Result of the stage job (success, failure, cancelled, etc.)'
    required: true
  stage-content:
    description: 'General content to display for any stage result (supports markdown)'
    required: false
    default: ''
  stage-success-content:
    description: 'Custom content to display on success (supports markdown)'
    required: false
    default: ''
  stage-skipped-content:
    description: 'Custom content to display on skipped (supports markdown). When provided, the stage is treated as a first-class skipped outcome rather than unknown.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Generate Stage Summary
      shell: bash
      env:
        STAGE_NAME: ${{ inputs.stage-name }}
        STAGE_RESULT: ${{ inputs.stage-result }}
        STAGE_CONTENT: ${{ inputs.stage-content }}
        STAGE_SUCCESS_CONTENT: ${{ inputs.stage-success-content }}
        STAGE_SKIPPED_CONTENT: ${{ inputs.stage-skipped-content }}
      run: |
        case "$STAGE_RESULT" in
          success|failure|cancelled|skipped) ;;
          *)
            echo "::error::Invalid stage-result '$STAGE_RESULT'. Must be one of: success, failure, cancelled, skipped."
            exit 1
            ;;
        esac

        write_header() {
          echo "## $1 $STAGE_NAME $2"
          echo ""
        }

        write_content() {
          local content="$1" fallback="$2"
          if [[ -n "$content" ]]; then
            printf '%s\n' "$content"
          elif [[ -n "$fallback" ]]; then
            echo "$fallback"
          fi
        }

        {
          echo "# $STAGE_NAME Summary"
          echo ""

          case "$STAGE_RESULT" in
            success)
              write_header "✅" "Succeeded"
              ;;
            failure)
              write_header "❌" "Failed"
              ;;
            cancelled)
              write_header "🛑" "Cancelled"
              ;;
            skipped)
              write_header "⏭️" "Skipped"
              ;;
          esac

          if [[ -n "$STAGE_CONTENT" ]]; then
            printf '%s\n\n' "$STAGE_CONTENT"
          fi

          case "$STAGE_RESULT" in
            success)
              write_content "$STAGE_SUCCESS_CONTENT" "Stage completed successfully."
              ;;
            failure)
              echo "The stage process encountered an error. Check the job logs for details."
              ;;
            cancelled)
              echo "⏹️ **Stage process was cancelled**"
              ;;
            skipped)
              write_content "$STAGE_SKIPPED_CONTENT" "Stage was skipped."
              ;;
          esac
        } >> "$GITHUB_STEP_SUMMARY"