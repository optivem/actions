name: 'Read Target Version'
description: 'Reads the target semantic version from a VERSION file'

inputs:
  file:
    description: 'Path to the VERSION file'
    required: false
    default: 'VERSION'

outputs:
  target-version:
    description: 'The target semantic version (e.g., 1.0.0)'
    value: ${{ steps.read.outputs.target-version }}

runs:
  using: 'composite'
  steps:
    - name: Read Target Version
      id: read
      shell: bash
      env:
        VERSION_FILE: ${{ inputs.file }}
      run: |
        if [ ! -f "$VERSION_FILE" ]; then
          echo "::error::VERSION file not found at '$VERSION_FILE'. Make sure to include the VERSION file in your repository."
          exit 1
        fi
        target_version=$(head -n 1 "$VERSION_FILE" | tr -d '[:space:]')
        echo "target-version=$target_version" >> "$GITHUB_OUTPUT"
