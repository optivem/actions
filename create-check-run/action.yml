name: 'Create Check Run'
description: 'Creates a GitHub Check Run (POST /repos/{repo}/check-runs) on the commit identified by `ref` (SHA, branch, or tag). Resolves ref to SHA server-side, so callers can pass an rc tag without a local checkout. Used to record verdict gates (e.g. qa/signoff success/failure) on rc commits. Pairs with check-run-exists (verify) and resolve-latest-prerelease-with-check (read).'

inputs:
  ref:
    description: 'Ref (SHA, branch, or tag) to attach the check run to. Resolved to a commit SHA via the commits API before the check run is written. SHAs pass through unchanged.'
    required: true
  name:
    description: 'Check run name. Use <env>/<verb> convention (e.g. "qa/signoff", "acceptance/tested"). Verbs describe the gate, not the outcome — the conclusion field carries the verdict.'
    required: true
  conclusion:
    description: 'Check run conclusion. One of: success, failure, neutral, cancelled, skipped, timed_out, action_required. Default: success.'
    required: false
    default: 'success'
  title:
    description: 'Title shown in the Checks UI. Empty -> uses the check run name.'
    required: false
    default: ''
  summary:
    description: 'Markdown summary of the check run. Empty -> empty summary.'
    required: false
    default: ''
  repository:
    description: 'Repository in owner/name form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token used for API calls. Needs checks:write + contents:read (for ref resolution). Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  check-run-id:
    description: 'Numeric ID of the created check run.'
    value: ${{ steps.create.outputs.check-run-id }}
  head-sha:
    description: 'The resolved commit SHA the check run was attached to.'
    value: ${{ steps.create.outputs.head-sha }}

runs:
  using: 'composite'
  steps:
    - id: create
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REF: ${{ inputs.ref }}
        NAME: ${{ inputs.name }}
        CONCLUSION: ${{ inputs.conclusion }}
        INPUT_TITLE: ${{ inputs.title }}
        SUMMARY: ${{ inputs.summary }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        TITLE="${INPUT_TITLE:-$NAME}"

        head_sha=$(gh_retry api "repos/${REPOSITORY}/commits/${REF}" --jq '.sha')

        check_run_id=$(jq -nc \
          --arg name "$NAME" \
          --arg sha "$head_sha" \
          --arg conclusion "$CONCLUSION" \
          --arg title "$TITLE" \
          --arg summary "$SUMMARY" \
          '{name: $name, head_sha: $sha, status: "completed", conclusion: $conclusion, output: {title: $title, summary: $summary}}' \
          | gh_retry api "repos/${REPOSITORY}/check-runs" --input - --jq '.id')

        echo "check-run-id=${check_run_id}" >> "$GITHUB_OUTPUT"
        echo "head-sha=${head_sha}" >> "$GITHUB_OUTPUT"
        echo "Recorded check run [${NAME}] conclusion=${CONCLUSION} on ${REF} (${head_sha})" >> "$GITHUB_STEP_SUMMARY"
