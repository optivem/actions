name: 'Wait for GitHub Workflow'
description: 'Waits for a GitHub Actions workflow run triggered by a specific commit SHA to complete. Polls by head-sha to find the run, then uses `gh run watch --exit-status` to block until finished. Includes GitHub API rate-limit protection. Sibling of `trigger-and-wait-for-github-workflow` — use that when you need to dispatch the workflow yourself.'
inputs:
  workflow:
    description: 'Workflow filename to wait for (e.g., java-commit-stage.yml)'
    required: true
  commit-sha:
    description: 'The commit SHA to match against'
    required: true
  repository:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  poll-interval:
    description: 'Seconds between discovery polls (default: 30)'
    required: false
    default: '30'
  watch-interval:
    description: 'Seconds between gh run watch polls (default: 120)'
    required: false
    default: '120'
  max-discovery-attempts:
    description: 'Maximum number of discovery polls before the action fails with "run never appeared" (default: 120 — with default poll-interval=30s this is 1 hour of discovery).'
    required: false
    default: '120'
  rate-limit-threshold:
    description: 'Pause when remaining API requests fall below this number (default: 50)'
    required: false
    default: '50'
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
outputs:
  run-id:
    description: 'The database ID of the matched workflow run'
    value: ${{ steps.wait.outputs.run_id }}

runs:
  using: 'composite'
  steps:
    - name: Wait for ${{ inputs.workflow }}
      id: wait
      env:
        GH_TOKEN: ${{ inputs.token }}
        WORKFLOW: ${{ inputs.workflow }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        REPOSITORY: ${{ inputs.repository }}
        POLL_INTERVAL: ${{ inputs.poll-interval }}
        WATCH_INTERVAL: ${{ inputs.watch-interval }}
        MAX_DISCOVERY_ATTEMPTS: ${{ inputs.max-discovery-attempts }}
        RATE_LIMIT_THRESHOLD: ${{ inputs.rate-limit-threshold }}
      shell: bash
      run: |
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"
        echo "Waiting for $WORKFLOW (commit: $COMMIT_SHA)..."

        attempt=1
        while [ "$attempt" -le "$MAX_DISCOVERY_ATTEMPTS" ]; do
          # --- Rate limit check (skip retry wrapper — local probe) ---
          remaining=$(gh api rate_limit --jq ".resources.core.remaining" 2>/dev/null || echo "999")
          if [ "$remaining" -lt "$RATE_LIMIT_THRESHOLD" ]; then
            reset=$(gh api rate_limit --jq ".resources.core.reset" 2>/dev/null || echo "0")
            wait_secs=$(( reset - $(date +%s) + 5 ))
            if [ "$wait_secs" -gt 0 ]; then
              echo "::warning::Rate limit low ($remaining remaining). Waiting ${wait_secs}s for reset..."
              sleep "$wait_secs"
            fi
          fi

          # --- Find run by commit SHA ---
          run_id=$(gh_retry run list \
            --workflow="$WORKFLOW" \
            --repo "$REPOSITORY" \
            --limit 5 \
            --json databaseId,headSha \
            --jq "[.[] | select(.headSha == \"$COMMIT_SHA\")] | .[0].databaseId")

          if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
            echo "Found run $run_id on attempt $attempt, watching..."
            echo "run_id=$run_id" >> $GITHUB_OUTPUT
            gh_retry run watch "$run_id" \
              --repo "$REPOSITORY" \
              --exit-status \
              --interval "$WATCH_INTERVAL"
            exit 0
          fi

          echo "Run not found yet (attempt $attempt/$MAX_DISCOVERY_ATTEMPTS), waiting ${POLL_INTERVAL}s..."
          sleep "$POLL_INTERVAL"
          attempt=$((attempt + 1))
        done

        echo "::error::Workflow $WORKFLOW did not appear for commit $COMMIT_SHA after $MAX_DISCOVERY_ATTEMPTS discovery attempts (total wait ~$((MAX_DISCOVERY_ATTEMPTS * POLL_INTERVAL))s). Check that the dispatch succeeded and that the commit SHA is correct."
        exit 1
