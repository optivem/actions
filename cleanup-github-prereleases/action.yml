name: 'Cleanup GitHub Prereleases'
description: 'Cleans up prerelease git tags, GitHub releases, and Docker image tags that are no longer needed'
author: 'Optivem'
branding:
  icon: 'trash-2'
  color: 'orange'

inputs:
  retention-days:
    description: 'Number of days to retain prerelease Docker image tags after release, and superseded RC artifacts before release'
    required: false
    default: '30'
  container-packages:
    description: 'Comma-separated list of container package names for Docker image tag cleanup (e.g., "myapp,myapp-worker"). If empty, Docker cleanup is skipped.'
    required: false
    default: ''
  delete-delay-seconds:
    description: 'Seconds to wait between each API delete call to avoid GitHub rate limiting'
    required: false
    default: '10'
  rate-limit-threshold:
    description: 'Pause before each API delete when remaining core-rate-limit requests fall below this number (set 0 to disable).'
    required: false
    default: '50'
  dry-run:
    description: 'If true, only log what would be deleted without actually deleting anything'
    required: false
    default: 'false'
  token:
    description: 'GitHub token used for tag, release, and package API calls. Defaults to the workflow-scoped GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

outputs:
  deleted-count:
    description: 'Number of items (git tags, GitHub releases, Docker image tags) actually deleted (real mode only; 0 in dry-run).'
    value: ${{ steps.cleanup.outputs.deleted-count }}
  dry-run-count:
    description: 'Number of items that would be deleted (dry-run mode only; 0 in real mode).'
    value: ${{ steps.cleanup.outputs.dry-run-count }}

runs:
  using: 'composite'
  steps:
    - name: Fetch all tags
      shell: bash
      run: git fetch --tags --force

    - name: Cleanup Prereleases
      id: cleanup
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        RETENTION_DAYS: ${{ inputs.retention-days }}
        CONTAINER_PACKAGES: ${{ inputs.container-packages }}
        DELETE_DELAY_SECONDS: ${{ inputs.delete-delay-seconds }}
        RATE_LIMIT_THRESHOLD: ${{ inputs.rate-limit-threshold }}
        DRY_RUN: ${{ inputs.dry-run }}
        REPOSITORY: ${{ github.repository }}
      run: bash "$GITHUB_ACTION_PATH/cleanup-github-prereleases.sh"
