name: 'Create and Push Tag'
description: 'Creates a git tag at a given commit SHA (or the current HEAD) and pushes it to origin, using the github-actions[bot] identity.'
author: 'Optivem'
branding:
  icon: 'tag'
  color: 'green'
inputs:
  tag:
    description: 'Git tag name to create (e.g., v1.0.3-rc.1)'
    required: true
  sha:
    description: 'Commit SHA to tag. Empty = current HEAD.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - id: tag
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
        SHA: ${{ inputs.sha }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ -n "$SHA" ]; then
          git tag "$TAG" "$SHA"
        else
          git tag "$TAG"
        fi
        git push origin "$TAG"
        echo "Created and pushed tag $TAG${SHA:+ at $SHA}" >> "$GITHUB_STEP_SUMMARY"
