name: test-check-github-release-exists

# Manual smoke test for the check-github-release-exists action.
# Probes one existing tag and one missing tag against a repository,
# prints outputs, asserts expectations.

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository in owner/repo format to probe.'
        required: true
        type: string
        default: 'optivem/shop'
      existing-tag:
        description: 'Tag that should have a published Release.'
        required: true
        type: string
      missing-tag:
        description: 'Tag that should NOT have a published Release.'
        required: false
        type: string
        default: 'v0.0.0-never-released'

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Probe releases
        id: probe
        uses: ./check-github-release-exists
        with:
          repository: ${{ inputs.repository }}
          releases: |
            [
              {"key": "existing", "tag": "${{ inputs.existing-tag }}"},
              {"key": "missing",  "tag": "${{ inputs.missing-tag }}"}
            ]

      - name: Show outputs
        env:
          RESULTS: ${{ steps.probe.outputs.results }}
          ANY_EXIST: ${{ steps.probe.outputs.any-exist }}
        run: |
          set -euo pipefail
          echo "results:"
          jq . <<<"$RESULTS"
          echo "any-exist: $ANY_EXIST"

      - name: Assert expectations
        env:
          RESULTS: ${{ steps.probe.outputs.results }}
          ANY_EXIST: ${{ steps.probe.outputs.any-exist }}
        run: |
          set -euo pipefail

          existing=$(jq -r '.[] | select(.key=="existing") | .exists' <<<"$RESULTS")
          missing=$(jq -r '.[] | select(.key=="missing") | .exists' <<<"$RESULTS")

          fail=0
          if [[ "$existing" != "true" ]]; then
            echo "::error::Expected existing-tag to be exists=true, got $existing"
            fail=1
          fi
          if [[ "$missing" != "false" ]]; then
            echo "::error::Expected missing-tag to be exists=false, got $missing"
            fail=1
          fi
          if [[ "$ANY_EXIST" != "true" ]]; then
            echo "::error::Expected any-exist=true (one input exists), got $ANY_EXIST"
            fail=1
          fi

          if (( fail == 0 )); then
            echo "All assertions passed."
          else
            exit 1
          fi
