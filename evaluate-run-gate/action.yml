name: 'Evaluate Run Gate'
description: 'Aggregates multiple skip signals into a single go/no-go decision for a pipeline stage. Evaluates skip-conditions in order; first matching entry wins and yields should-run=false plus its reason. If none match, should-run=true. Generic — use for any stage that composes multiple skip conditions (release race, stale artifacts, missing inputs, etc.).'

inputs:
  skip-conditions:
    description: 'JSON array of {"when": boolean, "reason": string} entries, evaluated in priority order. The first entry whose "when" is true short-circuits the gate: should-run=false, skip-reason=that entry''s reason. If no entry matches, should-run=true and skip-reason is empty. Caller composes each "when" from a GitHub Actions expression (e.g. steps.x.outputs.y == ''true'', wrapped in the usual ${ expression } braces by the caller) so the boolean is already resolved before the action runs.'
    required: true

outputs:
  should-run:
    description: '"true" when no skip-condition matched, "false" when one did.'
    value: ${{ steps.gate.outputs.should-run }}
  skip-reason:
    description: 'The reason from the first matching skip-condition, or empty string when should-run=true.'
    value: ${{ steps.gate.outputs.skip-reason }}

runs:
  using: 'composite'
  steps:
    - name: Evaluate Gate
      id: gate
      shell: bash
      env:
        SKIP_CONDITIONS: ${{ inputs.skip-conditions }}
      run: bash "$GITHUB_ACTION_PATH/gate.sh"
