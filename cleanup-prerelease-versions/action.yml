name: 'Cleanup Prerelease Versions'
description: 'Cleans up prerelease git tags, GitHub releases, and Docker image tags that are no longer needed'
author: 'Optivem'
branding:
  icon: 'trash-2'
  color: 'orange'

inputs:
  retention-days:
    description: 'Number of days to retain prerelease Docker image tags after release, and superseded RC artifacts before release'
    required: false
    default: '30'
  container-packages:
    description: 'Comma-separated list of container package names for Docker image tag cleanup (e.g., "myapp,myapp-worker"). If empty, Docker cleanup is skipped.'
    required: false
    default: ''
  dry-run:
    description: 'If true, only log what would be deleted without actually deleting anything'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Fetch all tags
      shell: bash
      run: git fetch --tags --force

    - name: Cleanup Prerelease Versions
      shell: pwsh
      run: |
        $scriptPath = Join-Path ${{ github.action_path }} "Cleanup-PrereleaseVersions.ps1"
        & $scriptPath `
          -RetentionDays ${{ inputs.retention-days }} `
          -ContainerPackages "${{ inputs.container-packages }}" `
          -DryRun ([System.Convert]::ToBoolean("${{ inputs.dry-run }}")) `
          -Repository "${{ github.repository }}"
      env:
        GH_TOKEN: ${{ env.GITHUB_TOKEN }}
