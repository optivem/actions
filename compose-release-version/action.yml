name: 'Compose Release Version'
description: 'Composes a release version from a prerelease version by stripping any SemVer pre-release identifier of the shape `-<word>.<number>` (e.g., v1.0.0-rc.1 → v1.0.0, v1.0.0-nightly.42 → v1.0.0). Pure string transform.'

inputs:
  prerelease-version:
    description: 'Prerelease version to convert. Accepts any SemVer prerelease identifier of the form `-<word>.<number>` (e.g., v1.0.0-rc.1, v1.0.0-alpha.1, v1.0.0-dev.3, v1.0.0-nightly.42).'
    required: true

outputs:
  version:
    description: 'Release version with the prerelease identifier removed (e.g., v1.0.0)'
    value: ${{ steps.convert-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Convert Prerelease to Release Version
      id: convert-version
      shell: bash
      env:
        PRERELEASE_VERSION: ${{ inputs.prerelease-version }}
      run: bash "$GITHUB_ACTION_PATH/convert-version.sh"
