name: 'Compose Release Version'
description: 'Composes a release version from a prerelease version by stripping the prerelease suffix (e.g., v1.0.0-rc.1 → v1.0.0). Pure string transform.'

inputs:
  prerelease-version:
    description: 'Prerelease version to convert (e.g., v1.0.0-rc.1, v1.0.0-alpha.1, v1.0.0-beta.1)'
    required: true

outputs:
  version:
    description: 'Release version with prerelease suffix removed (e.g., v1.0.0)'
    value: ${{ steps.convert-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Convert Prerelease to Release Version
      id: convert-version
      shell: bash
      env:
        PRERELEASE_VERSION: ${{ inputs.prerelease-version }}
      run: |
        set -euo pipefail

        if [[ -z "${PRERELEASE_VERSION:-}" ]]; then
          echo "::error::prerelease-version is required"
          exit 1
        fi

        echo "Input prerelease version: $PRERELEASE_VERSION"

        release=$(printf '%s' "$PRERELEASE_VERSION" | sed -E 's/-(rc|alpha|beta|preview)\.[0-9]+$//I')

        if [[ -z "$release" ]]; then
          echo "::error::Failed to generate release version from: $PRERELEASE_VERSION"
          exit 1
        fi

        if [[ "$PRERELEASE_VERSION" == v* && "$release" != v* ]]; then
          release="v$release"
        fi

        echo "Generated release version: $release"
        echo "version=$release" >> "$GITHUB_OUTPUT"
