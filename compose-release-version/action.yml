name: 'Compose Release Version'
description: 'Composes a release version from a prerelease version by stripping the prerelease suffix (e.g., v1.0.0-rc.1 → v1.0.0). Pure string transform.'

inputs:
  prerelease-version:
    description: 'Prerelease version to convert (e.g., v1.0.0-rc.1, v1.0.0-alpha.1, v1.0.0-beta.1)'
    required: true

outputs:
  version:
    description: 'Release version with prerelease suffix removed (e.g., v1.0.0)'
    value: ${{ steps.convert-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Convert Prerelease to Release Version
      id: convert-version
      run: |
        $scriptPath = Join-Path ${{ github.action_path }} "Compose-ReleaseVersion.ps1"
        & $scriptPath -PrereleaseVersion "${{ inputs.prerelease-version }}"
      shell: pwsh