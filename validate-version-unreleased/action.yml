name: 'Validate Version Unreleased'
description: 'Asserts that a version tag does NOT yet exist in the repository. By default fails the step if it does; with on-already-released=skip, sets the already-released output so the caller can short-circuit. Inverse of validate-tag-exists. Tool-agnostic — uses git tag -l, no platform API dependency.'

inputs:
  version:
    description: 'Fully composed version tag to check (e.g., v1.0.0, monolith-java-v1.0.0, meta-v1.0.0-rc.1-qa-approved). Compose prefix/version yourself before passing.'
    required: true
  on-already-released:
    description: 'Behavior when the tag already exists. "fail" (default) exits the step with an error. "skip" exits successfully and sets already-released=true so the caller can short-circuit downstream jobs — useful for scheduled acceptance-stage runs that race with an in-flight release before the post-release VERSION bump lands.'
    required: false
    default: 'fail'
  bump-workflow-file:
    description: 'Filename of the workflow that bumps VERSION (e.g. gh-auto-bump-patch.yml). When set and the version is already released, the error and job summary include a clickable link to run that workflow. Ignored when on-already-released=skip.'
    required: false
    default: ''
  rc-workflow-file:
    description: 'Filename of the workflow that creates a new RC prerelease (e.g. gh-acceptance-stage.yml). When set and the version is already released, the error and job summary include a clickable link to run that workflow after the VERSION bump. Recovering from an already-released version usually needs two steps — bump VERSION, then create a new RC — so pass both workflow inputs when applicable. Ignored when on-already-released=skip.'
    required: false
    default: ''

outputs:
  already-released:
    description: '"true" if the version tag already exists (only possible when on-already-released=skip; otherwise the step fails). "false" when the tag does not exist.'
    value: ${{ steps.check.outputs.already-released }}

runs:
  using: 'composite'
  steps:
    - name: Ensure Version Unreleased
      id: check
      shell: bash
      env:
        TAG: ${{ inputs.version }}
        ON_ALREADY_RELEASED: ${{ inputs.on-already-released }}
        BUMP_WORKFLOW_FILE: ${{ inputs.bump-workflow-file }}
        RC_WORKFLOW_FILE: ${{ inputs.rc-workflow-file }}
      run: |
        if [[ "$ON_ALREADY_RELEASED" != "fail" && "$ON_ALREADY_RELEASED" != "skip" ]]; then
          echo "::error::Invalid on-already-released value '$ON_ALREADY_RELEASED'. Must be 'fail' or 'skip'."
          exit 1
        fi
        git fetch --tags --force origin >/dev/null 2>&1 || true
        if git tag -l "$TAG" | grep -q -F -x "$TAG"; then
          if [[ "$ON_ALREADY_RELEASED" == "skip" ]]; then
            echo "already-released=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $TAG is already released — caller opted to skip instead of fail."
            exit 0
          fi
          BASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows"
          BUMP_URL=""
          RC_URL=""
          [[ -n "$BUMP_WORKFLOW_FILE" ]] && BUMP_URL="${BASE_URL}/${BUMP_WORKFLOW_FILE}"
          [[ -n "$RC_WORKFLOW_FILE" ]] && RC_URL="${BASE_URL}/${RC_WORKFLOW_FILE}"
          if [[ -n "$BUMP_URL" || -n "$RC_URL" ]]; then
            {
              echo "## Version already released"
              echo ""
              echo "\`$TAG\` already exists as a final release. To ship a new version:"
              echo ""
              i=1
              [[ -n "$BUMP_URL" ]] && { echo "${i}. Bump VERSION — run [\`${BUMP_WORKFLOW_FILE}\`](${BUMP_URL})."; i=$((i+1)); }
              [[ -n "$RC_URL" ]] && { echo "${i}. Create a new RC — run [\`${RC_WORKFLOW_FILE}\`](${RC_URL})."; }
            } >> "$GITHUB_STEP_SUMMARY"
            MSG="Version $TAG is already released."
            [[ -n "$BUMP_URL" ]] && MSG="$MSG Bump VERSION: ${BUMP_URL}."
            [[ -n "$RC_URL" ]] && MSG="$MSG Create a new RC: ${RC_URL}."
            echo "::error::${MSG}"
          else
            echo "::error::Version $TAG is already released. Cannot re-release. Bump the VERSION file and create a new RC."
          fi
          exit 1
        fi
        echo "already-released=false" >> "$GITHUB_OUTPUT"
        echo "Version $TAG has not been released yet — OK to proceed."
