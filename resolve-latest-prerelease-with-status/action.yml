name: 'Resolve Latest Prerelease with Status'
description: 'Lists prerelease (rc) tags in the calling repo by tag-prefix and returns the highest by rc number whose SHA has at least one success commit-status with the given context. Used to find the latest "qa-approved" / "acceptance-tested" prerelease once promotion state lives in commit-statuses rather than tag suffixes. Pairs with create-commit-status (write) and get-commit-status / check-commit-status-exists (read), and parallels resolve-latest-prerelease-tag (same noun, different qualifier).'

inputs:
  tag-prefix:
    description: 'Required tag prefix (e.g. "monolith-dotnet-v"). Only tags matching the strict pattern <tag-prefix><X.Y.Z>-rc.<N> are considered — legacy status-suffix tags (e.g. -qa-approved) are excluded.'
    required: true
  status-context:
    description: 'The commit-status context that must be present with state=success on the rc tag''s SHA (e.g. "qa/signoff").'
    required: true
  version:
    description: 'Optional. If set, restricts the search to tags matching <tag-prefix><version>-rc.<N>.'
    required: false
    default: ''
  repository:
    description: 'Repository in owner/name form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token used for API calls. Needs statuses:read. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  tag:
    description: 'The latest rc tag whose SHA has a passing commit-status.'
    value: ${{ steps.resolve.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TAG_PREFIX: ${{ inputs.tag-prefix }}
        STATUS_CONTEXT: ${{ inputs.status-context }}
        VERSION: ${{ inputs.version }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        # Caller must have run actions/checkout with fetch-depth: 0 (or fetched
        # tags by another mechanism) — git tag --list and git rev-parse below
        # need the local refs.

        if [[ -n "$VERSION" ]]; then
          glob="${TAG_PREFIX}${VERSION}-rc.*"
          escaped_version="${VERSION//./\\.}"
          pattern="^${TAG_PREFIX}${escaped_version}-rc\\.[0-9]+$"
        else
          glob="${TAG_PREFIX}*-rc.*"
          pattern="^${TAG_PREFIX}[0-9]+\\.[0-9]+\\.[0-9]+-rc\\.[0-9]+$"
        fi

        mapfile -t rc_tags < <(git tag --list "$glob" \
          | awk -v p="$pattern" '$0 ~ p' \
          | awk -F'-rc[.]' '{print $NF " " $0}' \
          | sort -k1,1 -nr \
          | awk '{print $2}')

        for tag in "${rc_tags[@]}"; do
          sha=$(git rev-parse "${tag}^{}" 2>/dev/null || git rev-parse "${tag}")
          statuses=$(gh_retry api "repos/${REPOSITORY}/commits/${sha}/statuses" --paginate)
          approved=$(echo "$statuses" | jq --arg ctx "$STATUS_CONTEXT" '[.[] | select(.context==$ctx and .state=="success")] | length')
          if [[ "${approved:-0}" -gt 0 ]]; then
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "Resolved latest rc with passing [${STATUS_CONTEXT}] commit-status: ${tag}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
        done

        if [[ -n "$VERSION" ]]; then
          echo "::error::No rc tag matching ${TAG_PREFIX}${VERSION}-rc.<N> has a successful [${STATUS_CONTEXT}] commit-status"
        else
          echo "::error::No rc tag matching ${TAG_PREFIX}<X.Y.Z>-rc.<N> has a successful [${STATUS_CONTEXT}] commit-status"
        fi
        exit 1
