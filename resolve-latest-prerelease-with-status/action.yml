name: 'Resolve Latest Prerelease with Status'
description: 'Lists prerelease (rc) tags in the calling repo by tag-prefix and returns the highest by rc number whose SHA has at least one success commit-status with the given context. Used to find the latest "qa-approved" / "acceptance-tested" prerelease once promotion state lives in commit-statuses rather than tag suffixes. Pairs with create-commit-status (write) and get-commit-status / check-commit-status-exists (read), and parallels resolve-latest-prerelease-tag (same noun, different qualifier).'

inputs:
  tag-prefix:
    description: 'Required tag prefix (e.g. "monolith-dotnet-v"). Only tags matching the strict pattern <tag-prefix><X.Y.Z>-rc.<N> are considered — legacy status-suffix tags (e.g. -qa-approved) are excluded.'
    required: true
  status-context:
    description: 'The commit-status context that must be present with state=success on the rc tag''s SHA (e.g. "qa/signoff").'
    required: true
  version:
    description: 'Optional. If set, restricts the search to tags matching <tag-prefix><version>-rc.<N>.'
    required: false
    default: ''
  repository:
    description: 'Repository in owner/name form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token used for API calls. Needs statuses:read. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  tag:
    description: 'The latest rc tag whose SHA has a passing commit-status.'
    value: ${{ steps.resolve.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TAG_PREFIX: ${{ inputs.tag-prefix }}
        STATUS_CONTEXT: ${{ inputs.status-context }}
        VERSION: ${{ inputs.version }}
        REPOSITORY: ${{ inputs.repository }}
      run: bash "$GITHUB_ACTION_PATH/resolve.sh"
