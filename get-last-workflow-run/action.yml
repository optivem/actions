name: 'Get Last Workflow Run'
description: 'Returns the createdAt timestamp of the most recent run of a given workflow matching the given status and conclusion (defaults to completed + success), excluding the current run, queried via gh run list. Output is empty when no matching run exists.'

inputs:
  workflow-name:
    description: 'Workflow file name or display name to query (e.g. `github.workflow`).'
    required: true
  repository:
    description: 'Repository in "owner/name" form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  exclude-run-id:
    description: 'Run ID to exclude from results — typically the current run, so the action returns the previous run. Set to empty string to disable exclusion. Defaults to github.run_id.'
    required: false
    default: ${{ github.run_id }}
  status:
    description: 'Run status to filter on (e.g. `completed`, `in_progress`, `queued`). Set to empty string to disable the status filter. Defaults to `completed` so concurrent in-progress siblings cannot be returned as the "previous" run.'
    required: false
    default: 'completed'
  conclusion:
    description: 'Run conclusion to filter on (e.g. `success`, `failure`, `cancelled`, `skipped`). Set to empty string to disable the conclusion filter. Defaults to `success` so freshness gates compare against the last *successful* verification — failed runs do not count as "last verified", letting the next trigger retry.'
    required: false
    default: 'success'
  limit:
    description: 'Maximum number of recent runs to fetch from `gh run list` before applying filters. Must be large enough to cover concurrent triggers (push + schedule + dispatch arriving together) plus any recent runs filtered out by `status`/`conclusion`. Increase if recent failures or in-progress siblings can push the last matching run beyond the default window.'
    required: false
    default: '20'
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  timestamp:
    description: 'ISO 8601 createdAt of the last matching run. Empty if no matching run exists.'
    value: ${{ steps.get.outputs.timestamp }}

runs:
  using: 'composite'
  steps:
    - name: Get last workflow run
      id: get
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        WORKFLOW_NAME: ${{ inputs.workflow-name }}
        REPOSITORY: ${{ inputs.repository }}
        EXCLUDE_RUN_ID: ${{ inputs.exclude-run-id }}
        STATUS: ${{ inputs.status }}
        CONCLUSION: ${{ inputs.conclusion }}
        LIMIT: ${{ inputs.limit }}
      run: bash "$GITHUB_ACTION_PATH/get.sh"
