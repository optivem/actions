name: 'Get Last Workflow Run'
description: 'Returns the createdAt timestamp of the most recent completed run of a given workflow (excluding the current run), queried via gh run list. Queued and in-progress runs are filtered out so concurrent siblings cannot be returned as the "previous" run. Output is empty when no previous completed run exists.'

inputs:
  workflow-name:
    description: 'Workflow file name or display name to query (e.g. `github.workflow`).'
    required: true
  repository:
    description: 'Repository in "owner/name" form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  exclude-run-id:
    description: 'Run ID to exclude from results — typically the current run, so the action returns the previous run. Set to empty string to disable exclusion. Defaults to github.run_id.'
    required: false
    default: ${{ github.run_id }}
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  timestamp:
    description: 'ISO 8601 createdAt of the last completed run. Empty if no previous completed run exists.'
    value: ${{ steps.get.outputs.timestamp }}

runs:
  using: 'composite'
  steps:
    - name: Get last workflow run
      id: get
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        WORKFLOW_NAME: ${{ inputs.workflow-name }}
        REPOSITORY: ${{ inputs.repository }}
        EXCLUDE_RUN_ID: ${{ inputs.exclude-run-id }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        # Limit 10 covers the case where the current run plus a flurry of
        # concurrent triggers (push + schedule + dispatch) all show up before
        # the previous completed run.
        #
        # Filter to status == "completed" so we never pick a sibling run that
        # is still queued or in_progress as the "previous" run. Picking such a
        # sibling makes its createdAt a future timestamp from the perspective
        # of the artifact-freshness comparison, which would force a false skip
        # when concurrent runs race (e.g. scheduled run + workflow_dispatch
        # arriving within seconds of each other).
        timestamp=$(gh_retry run list \
          --repo "${REPOSITORY}" \
          --workflow "$WORKFLOW_NAME" \
          --limit 10 \
          --json databaseId,createdAt,status \
          2>/dev/null \
          | jq -r --arg cur "$EXCLUDE_RUN_ID" \
               '[.[] | select(.status == "completed") | select(($cur == "") or (.databaseId != ($cur | tonumber)))][0].createdAt // ""')

        if [[ -z "$timestamp" ]]; then
          echo "No previous completed run found for workflow '$WORKFLOW_NAME'."
        else
          echo "Last completed run: $timestamp"
        fi

        echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"
