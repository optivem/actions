name: 'Wait for Endpoints'
description: 'Polls a list of HTTP endpoints until each responds with success (curl -f), max attempts are exhausted, or the hard `timeout-seconds` ceiling is reached. On failure, optionally dumps Docker Compose logs and container status.'

inputs:
  endpoints:
    description: 'JSON array of endpoints to health check, each with name and url (e.g., [{"name": "API", "url": "http://localhost:8080/health"}])'
    required: true
  compose-file:
    description: 'Docker Compose file for log dump on failure. If set, runs `docker compose -f <file> logs/ps` when any URL fails.'
    required: false
    default: ''
  working-directory:
    description: 'Working directory for the Docker Compose log dump (used only when compose-file is set).'
    required: false
    default: '.'
  max-attempts:
    description: 'Maximum number of polling attempts per URL'
    required: false
    default: '30'
  wait-seconds:
    description: 'Seconds to wait between attempts'
    required: false
    default: '10'
  timeout-seconds:
    description: 'Hard timeout on the total polling time across all endpoints. The action fails with exit code 124 if not all endpoints have become ready within this many seconds. Default: 900 (15 minutes) ÔÇö aligned with fast-feedback sizing. Callers running probes that legitimately exceed 15 minutes must override upward.'
    required: false
    default: '900'

runs:
  using: 'composite'
  steps:
    - name: Wait for Endpoints
      env:
        ENDPOINTS: ${{ inputs.endpoints }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        WAIT_SECONDS: ${{ inputs.wait-seconds }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        COUNT=$(echo "$ENDPOINTS" | jq 'length')

        if [[ "$COUNT" -eq 0 ]]; then
          echo "ÔÜá´ŞĆ No endpoints provided, skipping health checks"
          exit 0
        fi

        echo "ÔĆ│ Waiting for $COUNT endpoint(s) to be ready (timeout: ${TIMEOUT_SECONDS}s)..."
        echo ""

        DEADLINE=$(( $(date +%s) + TIMEOUT_SECONDS ))

        # Cap exponential growth so a long-running pipeline doesn't wait 8+ minutes between probes.
        MAX_BACKOFF=$((WAIT_SECONDS * 16))
        FAILED=0
        TIMED_OUT=0

        for i in $(seq 0 $((COUNT - 1))); do
          NAME=$(echo "$ENDPOINTS" | jq -r ".[$i].name")
          URL=$(echo "$ENDPOINTS" | jq -r ".[$i].url")

          echo "ÔĆ│ Waiting for $NAME at $URL..."

          attempt=1

          while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
            now=$(date +%s)
            if [ "$now" -ge "$DEADLINE" ]; then
              echo "ÔŁî Timed out after ${TIMEOUT_SECONDS}s waiting for $NAME (hard timeout reached)"
              TIMED_OUT=1
              FAILED=1
              break
            fi

            if curl -f "$URL" > /dev/null 2>&1; then
              echo "Ôťů $NAME is ready!"
              break
            fi
            backoff=$((WAIT_SECONDS * (2 ** (attempt - 1))))
            if [ "$backoff" -gt "$MAX_BACKOFF" ]; then backoff=$MAX_BACKOFF; fi
            jitter=$((RANDOM % 3))
            sleep_secs=$((backoff + jitter))

            # Clamp sleep to the remaining deadline so we exit promptly on timeout.
            remaining=$(( DEADLINE - $(date +%s) ))
            if [ "$remaining" -le 0 ]; then
              echo "ÔŁî Timed out after ${TIMEOUT_SECONDS}s waiting for $NAME (hard timeout reached)"
              TIMED_OUT=1
              FAILED=1
              break
            fi
            if [ "$sleep_secs" -gt "$remaining" ]; then sleep_secs=$remaining; fi

            echo "­čöä Attempt $attempt/$MAX_ATTEMPTS: $NAME not ready yet, waiting ${sleep_secs}s (backoff=${backoff}, jitter=${jitter})..."
            sleep "$sleep_secs"
            attempt=$((attempt + 1))
          done

          if [ "$TIMED_OUT" -eq 1 ]; then
            break
          fi

          if [ "$attempt" -gt "$MAX_ATTEMPTS" ]; then
            echo "ÔŁî $NAME failed to become ready after $MAX_ATTEMPTS attempts"
            FAILED=1
          fi

          echo ""
        done

        if [ $FAILED -eq 1 ]; then
          if [[ -n "$COMPOSE_FILE" ]]; then
            echo "­čöŹ Checking Docker Compose container logs:"
            docker compose -f "$COMPOSE_FILE" logs --timestamps
            echo "­čÉ│ Docker Compose container status:"
            docker compose -f "$COMPOSE_FILE" ps
          fi
          if [ "$TIMED_OUT" -eq 1 ]; then
            exit 124
          fi
          exit 1
        fi

        echo "Ôťů All endpoints are ready!"
      shell: bash
      working-directory: ${{ inputs.working-directory }}
