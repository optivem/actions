name: 'Wait for Endpoints'
description: 'Polls a list of HTTP endpoints until each responds with success (curl -f), max attempts are exhausted, or the hard `timeout-seconds` ceiling is reached. On failure, optionally dumps Docker Compose logs and container status.'

inputs:
  endpoints:
    description: 'JSON array of endpoints to health check, each with name and url (e.g., [{"name": "API", "url": "http://localhost:8080/health"}])'
    required: true
  compose-file:
    description: 'Docker Compose file for log dump on failure. If set, runs `docker compose -f <file> logs/ps` when any URL fails.'
    required: false
    default: ''
  working-directory:
    description: 'Working directory for the Docker Compose log dump (used only when compose-file is set).'
    required: false
    default: '.'
  max-attempts:
    description: 'Maximum number of polling attempts per URL'
    required: false
    default: '30'
  wait-seconds:
    description: 'Seconds to wait between attempts'
    required: false
    default: '10'
  timeout-seconds:
    description: 'Hard timeout on the total polling time across all endpoints. The action fails with exit code 124 if not all endpoints have become ready within this many seconds. Default: 900 (15 minutes) — aligned with fast-feedback sizing. Callers running probes that legitimately exceed 15 minutes must override upward.'
    required: false
    default: '900'

runs:
  using: 'composite'
  steps:
    - name: Wait for Endpoints
      env:
        ENDPOINTS: ${{ inputs.endpoints }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        WAIT_SECONDS: ${{ inputs.wait-seconds }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: bash "$GITHUB_ACTION_PATH/wait.sh"
      shell: bash
      working-directory: ${{ inputs.working-directory }}
