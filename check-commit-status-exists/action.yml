name: 'Check Commit Status Exists'
description: 'Boolean existence check for a success commit-status on head-sha matching (context, description=sha). Returns exists=true when the status is present, exists=false when the API definitively reports no matching status. API failure (after gh_retry exhaustion) is indeterminate — the action exits 1 rather than coercing to a false answer. Caller picks the context label; the action only reports presence. Pairs with `create-commit-status` (write) and `get-commit-status` (read state).'

inputs:
  commit-sha:
    description: 'Commit SHA whose presence as the description of a commit-status is being checked (typically an upstream-repo commit whose work the pipeline previously processed). Matched against the `description` field of commit-statuses on head-sha.'
    required: true
  status-context:
    description: 'The commit-status context to search for (e.g. `acceptance-stage`, `security-scan`, `license-check`). Matched against the `context` field. Caller-chosen label encoding the type of check.'
    required: true
  head-sha:
    description: 'Commit whose statuses are inspected. Defaults to `github.sha`.'
    required: false
    default: ${{ github.sha }}
  repository:
    description: 'Repository in "owner/name" form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  exists:
    description: |
      'true' when a success commit-status exists on head-sha with matching context + description.
      'false' when the API definitively reports no matching status.
      API failure (after gh_retry exhaustion) is indeterminate — the action exits 1 instead of coercing to 'false'.
    value: ${{ steps.check.outputs.exists }}
  created-at:
    description: 'ISO 8601 createdAt of the matching success status, if one was found. Empty otherwise.'
    value: ${{ steps.check.outputs.created-at }}

runs:
  using: 'composite'
  steps:
    - name: Look up commit statuses on head-sha
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        STATUS_CONTEXT: ${{ inputs.status-context }}
        HEAD_SHA: ${{ inputs.head-sha }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        if [[ -z "$HEAD_SHA" ]]; then
          echo "::error::head-sha is empty"
          exit 1
        fi

        echo "Head SHA: $HEAD_SHA"
        echo "Commit SHA (matched against description): $COMMIT_SHA"
        echo "Status context: $STATUS_CONTEXT"

        if ! statuses=$(gh_retry api "repos/${REPOSITORY}/commits/${HEAD_SHA}/statuses" --paginate 2>&1); then
          echo "::error::Could not fetch commit statuses for ${REPOSITORY}@${HEAD_SHA} after gh_retry exhaustion. Indeterminate — exiting 1 rather than coercing to exists=false. Details: $statuses"
          exit 1
        fi

        match_created_at=$(echo "$statuses" | jq -r --arg ctx "$STATUS_CONTEXT" --arg sha "$COMMIT_SHA" '
          map(select(.context == $ctx and .description == $sha and .state == "success"))
          | .[0].created_at // ""
        ')

        if [[ -n "$match_created_at" ]]; then
          echo "Matching success status found, created at $match_created_at — exists=true"
          {
            echo "exists=true"
            echo "created-at=$match_created_at"
          } >> "$GITHUB_OUTPUT"
        else
          echo "No matching success status — exists=false"
          {
            echo "exists=false"
            echo "created-at="
          } >> "$GITHUB_OUTPUT"
        fi
