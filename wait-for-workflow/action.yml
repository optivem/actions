name: 'Wait for Workflow'
description: 'Waits for a GitHub Actions workflow run triggered by a specific commit SHA to complete. Polls by head-sha to find the run, then uses `gh run watch --exit-status` to block until finished. Includes GitHub API rate-limit protection and a hard timeout ceiling on the combined discovery + watch phases. Sibling of `trigger-and-wait-for-workflow` — use that when you need to dispatch the workflow yourself.'
inputs:
  workflow:
    description: 'Workflow filename (e.g. monolith-java-commit-stage.yml) — matches `gh workflow run --workflow`'
    required: true
  commit-sha:
    description: 'The commit SHA to match against'
    required: true
  repository:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  poll-interval:
    description: 'Seconds between discovery polls (default: 30)'
    required: false
    default: '30'
  watch-interval:
    description: 'Seconds between gh run watch polls (default: 120)'
    required: false
    default: '120'
  max-discovery-attempts:
    description: 'Maximum number of discovery polls before the action fails with "run never appeared" (default: 120 — with default poll-interval=30s this is 1 hour of discovery).'
    required: false
    default: '120'
  rate-limit-threshold:
    description: 'Pause when remaining API requests fall below this number (default: 50)'
    required: false
    default: '50'
  timeout-seconds:
    description: 'Hard timeout on the combined discovery + watch phases. The action fails with exit code 124 if a matching run has not been discovered AND watched to completion within this many seconds. Default: 1800 (30 minutes) — aligned with fast-feedback sizing. Callers waiting for longer-running workflows must override upward.'
    required: false
    default: '1800'
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
outputs:
  run-id:
    description: 'The database ID of the matched workflow run'
    value: ${{ steps.wait.outputs.run_id }}

runs:
  using: 'composite'
  steps:
    - name: Wait for ${{ inputs.workflow }}
      id: wait
      env:
        GH_TOKEN: ${{ inputs.token }}
        WORKFLOW: ${{ inputs.workflow }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        REPOSITORY: ${{ inputs.repository }}
        POLL_INTERVAL: ${{ inputs.poll-interval }}
        WATCH_INTERVAL: ${{ inputs.watch-interval }}
        MAX_DISCOVERY_ATTEMPTS: ${{ inputs.max-discovery-attempts }}
        RATE_LIMIT_THRESHOLD: ${{ inputs.rate-limit-threshold }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/wait.sh"
