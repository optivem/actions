name: 'Commit Files via GitHub Contents API'
description: 'GitHub-API primitive: writes a set of files to a branch via the Contents API with SHA preconditions, retrying on conflict. Race-safe alternative to `git push` for workflows that may run concurrently on the same branch.'
author: 'Optivem'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  files:
    description: 'JSON array of `{path, content, message}` entries. `path` is repo-relative, `content` is the full new file content (plain text, will be base64-encoded before PUT), `message` is the commit message for that file.'
    required: true
  branch:
    description: 'Branch to commit to (default: the branch of the current run)'
    required: false
    default: ${{ github.ref_name }}
  max-retries:
    description: 'Maximum number of retries per file on SHA-precondition conflict (HTTP 409/422)'
    required: false
    default: '3'
  token:
    description: 'GitHub token with contents:write permission on the target branch. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  commits:
    description: 'JSON array of `{path, commit-sha, content-sha, html-url}` for each file that was committed'
    value: ${{ steps.commit.outputs.commits }}
  committed:
    description: 'true if at least one file was committed'
    value: ${{ steps.commit.outputs.committed }}

runs:
  using: 'composite'
  steps:
    - name: Commit Files
      id: commit
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        FILES_JSON: ${{ inputs.files }}
        BRANCH: ${{ inputs.branch }}
        REPOSITORY: ${{ github.repository }}
        MAX_RETRIES: ${{ inputs.max-retries }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        echo "Committing files to $REPOSITORY@$BRANCH via Contents API..."

        count=$(jq 'length' <<<"$FILES_JSON")
        if [[ "$count" -eq 0 ]]; then
          echo "No files to commit."
          {
            echo "commits=[]"
            echo "committed=false"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        commits_array='[]'

        for i in $(seq 0 $((count - 1))); do
          path=$(jq -r ".[$i].path" <<<"$FILES_JSON")
          message=$(jq -r ".[$i].message" <<<"$FILES_JSON")

          if [[ -z "$path" || "$path" == "null" || -z "$message" || "$message" == "null" ]]; then
            echo "::error::Invalid entry at index $i — each file must define path, content, and message."
            exit 1
          fi

          # Extract content exactly (jq -j = no trailing newline), base64-encode.
          content_file=$(mktemp)
          jq -j ".[$i].content" <<<"$FILES_JSON" > "$content_file"
          if [[ ! -s "$content_file" ]] && [[ "$(jq ".[$i].content" <<<"$FILES_JSON")" == "null" ]]; then
            rm -f "$content_file"
            echo "::error::Invalid entry at index $i — content is null."
            exit 1
          fi
          content_b64=$(base64 -w0 < "$content_file")
          rm -f "$content_file"

          attempt=0
          committed=false

          while [[ "$committed" == "false" ]]; do
            attempt=$((attempt + 1))

            # Read current SHA (if file exists) for optimistic-concurrency PUT.
            current_sha=""
            if get_out=$(gh_retry api "repos/$REPOSITORY/contents/$path?ref=$BRANCH" 2>&1); then
              current_sha=$(jq -r '.sha' <<<"$get_out")
            elif grep -Eqi '404|Not Found' <<<"$get_out"; then
              current_sha=""
            else
              echo "::error::Failed to read $path from $REPOSITORY@$BRANCH: $get_out"
              exit 1
            fi

            body=$(jq -n \
              --arg message "$message" \
              --arg content "$content_b64" \
              --arg branch "$BRANCH" \
              --arg sha "$current_sha" \
              '{message: $message, content: $content, branch: $branch} + (if $sha != "" then {sha: $sha} else {} end)')

            tmp_file=$(mktemp)
            printf '%s' "$body" > "$tmp_file"
            if put_out=$(gh_retry api --method PUT "repos/$REPOSITORY/contents/$path" --input "$tmp_file" 2>&1); then
              rm -f "$tmp_file"
              commit_sha=$(jq -r '.commit.sha' <<<"$put_out")
              content_sha=$(jq -r '.content.sha' <<<"$put_out")
              html_url=$(jq -r '.commit.html_url' <<<"$put_out")
              echo "Committed $path (${commit_sha:0:7})"
              commits_array=$(jq \
                --arg path "$path" \
                --arg commit_sha "$commit_sha" \
                --arg content_sha "$content_sha" \
                --arg html_url "$html_url" \
                '. + [{path: $path, "commit-sha": $commit_sha, "content-sha": $content_sha, "html-url": $html_url}]' \
                <<<"$commits_array")
              committed=true
            else
              rm -f "$tmp_file"
              if grep -Eqi 'does not match|409|422' <<<"$put_out" && (( attempt < MAX_RETRIES )); then
                delay=$((2 ** attempt))
                echo "::warning::SHA conflict on $path (attempt $attempt/$MAX_RETRIES), retrying in ${delay}s..."
                sleep "$delay"
              else
                echo "::error::Failed to commit $path after $attempt attempt(s): $put_out"
                exit 1
              fi
            fi
          done
        done

        commits_json=$(jq -c . <<<"$commits_array")
        {
          echo "commits=$commits_json"
          echo "committed=true"
        } >> "$GITHUB_OUTPUT"

        echo "Done. Committed $count file(s)."
