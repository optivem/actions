name: 'Summarize System Stage'
description: 'Creates a comprehensive summary of system stage execution results for CI/CD pipelines'
author: 'Optivem'

branding:
  icon: 'clipboard'
  color: 'blue'

inputs:
  stage-name:
    description: 'The name of the stage (e.g., Acceptance, QA, Production)'
    required: true
  stage-result:
    description: 'Overall result of the stage (success/failure/skipped)'
    required: true
  environment:
    description: 'The environment name for this stage'
    required: true
  success-version:
    description: 'The version created on success (e.g., prerelease version)'
    required: false
  success-artifact-ids:
    description: 'The artifact IDs created on success as JSON array. Single artifacts must also be in array format: ["artifact"]. Multiple artifacts: ["artifact1", "artifact2"]'
    required: false
  skipped-reason:
    description: 'Human-readable reason the stage was skipped (e.g., "No new artifacts since last successful run"). Only used when stage-result is "skipped".'
    required: false
  latest-artifact-ids:
    description: 'The latest known artifact IDs as JSON array (even though the stage did not run against them). Displayed on skipped. Same format as success-artifact-ids.'
    required: false
  latest-updated-at:
    description: 'ISO 8601 timestamp of when the latest artifacts were last updated. Displayed on skipped.'
    required: false
  last-run-at:
    description: 'ISO 8601 timestamp of the last successful run of this workflow. Displayed on skipped.'
    required: false


runs:
  using: 'composite'
  steps:
    - name: Validate Inputs
      run: |
        $scriptPath = Join-Path ${{ github.action_path }} "scripts/Validate-Inputs.ps1"
        & $scriptPath -StageResult "${{ inputs.stage-result }}" -SuccessVersion "${{ inputs.success-version }}"
      shell: pwsh

    - name: Process Success Artifact IDs
      id: process-success-artifacts
      run: |
        $scriptPath = Join-Path ${{ github.action_path }} "scripts/Process-Artifacts.ps1"
        & $scriptPath -ArtifactsInput '${{ inputs.success-artifact-ids }}'
      shell: pwsh

    - name: Process Latest Artifact IDs
      id: process-latest-artifacts
      run: |
        $scriptPath = Join-Path ${{ github.action_path }} "scripts/Process-Artifacts.ps1"
        & $scriptPath -ArtifactsInput '${{ inputs.latest-artifact-ids }}'
      shell: pwsh

    - name: Generate System Stage Summary
      uses: optivem/actions/summarize-stage@v1
      with:
        stage-name: ${{ inputs.stage-name }}
        stage-result: ${{ inputs.stage-result }}
        stage-content: |
          🌍 **Environment:** ${{ inputs.environment }}
        stage-success-content: |
          🎯 **Release Candidate:** ${{ inputs.success-version }}

          ${{ steps.process-success-artifacts.outputs.artifacts-formatted && format('🔗 **Artifacts:**{0}{1}', fromJSON('"\n"'), steps.process-success-artifacts.outputs.artifacts-formatted) || '' }}
        stage-skipped-content: |
          ${{ inputs.skipped-reason && format('ℹ️ **Reason:** {0}', inputs.skipped-reason) || '' }}

          ${{ inputs.latest-updated-at && format('🕒 **Latest artifacts updated at:** `{0}`', inputs.latest-updated-at) || '' }}

          ${{ inputs.last-run-at && format('✅ **Last successful run at:** `{0}`', inputs.last-run-at) || '' }}

          ${{ steps.process-latest-artifacts.outputs.artifacts-formatted && format('🔗 **Latest known artifacts:**{0}{1}', fromJSON('"\n"'), steps.process-latest-artifacts.outputs.artifacts-formatted) || '' }}

    - name: Annotate Skipped Reason
      if: inputs.stage-result == 'skipped' && inputs.skipped-reason != ''
      shell: bash
      run: echo "::notice title=${{ inputs.stage-name }} skipped::${{ inputs.skipped-reason }}"
