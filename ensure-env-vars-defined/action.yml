name: 'Ensure Env Vars Defined'
description: 'Validates that required variables and secrets are defined before workflow execution. List the names in the names input and pass the values via env.'
author: 'Optivem'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  names:
    description: 'Newline-separated list of environment variable names to validate'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Validate Config
      run: |
        missing=()

        while IFS= read -r name; do
          name=$(echo "$name" | xargs)
          [ -z "$name" ] && continue
          value=$(printenv "$name" 2>/dev/null || true)
          if [ -z "$value" ]; then
            missing+=("$name")
          fi
        done <<< "$VALIDATE_NAMES"

        if [ ${#missing[@]} -gt 0 ]; then
          echo "::error::Missing required config: ${missing[*]}"
          exit 1
        fi

        echo "All required config values are defined."
      shell: bash
      env:
        VALIDATE_NAMES: ${{ inputs.names }}
