name: 'Build Docker Image'
description: 'Builds a Docker image locally and tags it with the commit SHA. Single concern — no registry tagging, no version composition. Pair with `tag-docker-image-local` for additional tags and `push-docker-image` to publish.'
author: 'Optivem'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  working-directory:
    description: 'Working directory where Dockerfile is located'
    required: false
    default: '.'
  image-name:
    description: 'Local Docker image name (no registry prefix). Used as the base of the local tag {image-name}:{commit-sha}.'
    required: true
  commit-sha:
    description: 'Git commit SHA used as the local image tag'
    required: false
    default: '${{ github.sha }}'
  dockerfile:
    description: 'Path to Dockerfile relative to working-directory'
    required: false
    default: 'Dockerfile'

outputs:
  local-image-ref:
    description: 'The local image reference ({image-name}:{commit-sha}). Feed into `tag-docker-image-local` to apply registry tags.'
    value: '${{ steps.build.outputs.local-image-ref }}'

runs:
  using: 'composite'
  steps:
    - id: build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        DOCKERFILE: ${{ inputs.dockerfile }}
      run: |
        LOCAL_REF="${IMAGE_NAME}:${COMMIT_SHA}"
        echo "🔨 Building $LOCAL_REF from $DOCKERFILE..."

        max_attempts=3
        base_delay=5
        for attempt in $(seq 1 $max_attempts); do
          if docker build . --file "$DOCKERFILE" --tag "$LOCAL_REF"; then
            echo "✅ Docker image built successfully (attempt $attempt)"
            echo "local-image-ref=$LOCAL_REF" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$attempt" -lt "$max_attempts" ]; then
            backoff=$((base_delay * (2 ** (attempt - 1))))
            jitter=$((RANDOM % 3))
            sleep_secs=$((backoff + jitter))
            echo "::warning::Docker build failed on attempt $attempt/$max_attempts. Retrying in ${sleep_secs}s (backoff=${backoff}, jitter=${jitter})..."
            sleep "$sleep_secs"
          fi
        done
        echo "::error::Docker build failed after $max_attempts attempts"
        exit 1
