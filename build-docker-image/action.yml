name: 'Build Docker Image'
description: 'Builds and tags a Docker image locally without pushing to a registry'
author: 'Optivem'
branding:
  icon: 'package'
  color: 'blue'
inputs:
  working-directory:
    description: 'Working directory where Dockerfile is located'
    required: false
    default: '.'
  image-name:
    description: 'Name of the Docker image (without registry prefix)'
    required: true
  registry:
    description: 'Container registry URL (e.g., ghcr.io, docker.io, gcr.io)'
    required: false
    default: 'ghcr.io'
  image-namespace:
    description: 'Namespace/organization for the image (e.g., github.repository for GHCR)'
    required: false
    default: '${{ github.repository }}'
  commit-sha:
    description: 'Git commit SHA for image tagging'
    required: false
    default: '${{ github.sha }}'
  component-version:
    description: 'Component version (e.g., "1.0.0"). If provided, image is tagged as v{component-version}-dev.{build-number}. Requires build-number.'
    required: false
    default: ''
  build-number:
    description: 'Build number for dev tagging (e.g., github.run_number). Required when component-version is provided.'
    required: false
    default: ''
  dockerfile:
    description: 'Path to Dockerfile relative to working directory'
    required: false
    default: 'Dockerfile'
outputs:
  image-sha-tag:
    description: 'Full image reference tagged with commit SHA'
    value: '${{ steps.tag.outputs.image-sha-tag }}'
  image-latest-url:
    description: 'Full image reference tagged with latest tag'
    value: '${{ steps.tag.outputs.image-latest-url }}'
  image-version-tag:
    description: 'Full image reference tagged with component version (empty if component-version not provided)'
    value: '${{ steps.tag.outputs.image-version-tag }}'
runs:
  using: 'composite'
  steps:
    - name: Echo Information
      run: |
        echo "🐳 Starting Docker build action"
        echo "📦 Image name: ${{ inputs.image-name }}"
        echo "📁 Working directory: ${{ inputs.working-directory }}"
        echo "🐳 Dockerfile: ${{ inputs.dockerfile }}"
        echo "🔖 Git SHA: ${{ inputs.commit-sha }}"
        echo "🌐 Registry: ${{ inputs.registry }}"
        echo "📍 Namespace: ${{ inputs.image-namespace }}"
      shell: bash

    - name: Build the Docker image
      run: |
        echo "🔨 Building Docker image..."
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if docker build . --file ${{ inputs.dockerfile }} --tag ${{ inputs.image-name }}:${{ inputs.commit-sha }}; then
            echo "✅ Docker image built successfully (attempt $attempt)"
            exit 0
          fi
          if [ "$attempt" -lt "$max_attempts" ]; then
            echo "::warning::Docker build failed on attempt $attempt of $max_attempts. Retrying in 15s..."
            sleep 15
          fi
        done
        echo "::error::Docker build failed after $max_attempts attempts"
        exit 1
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    - name: Compose Component Version
      id: compose-version
      if: inputs.component-version != ''
      uses: optivem/actions/compose-prerelease-version@v1
      with:
        target-version: ${{ inputs.component-version }}
        suffix: dev
        number: ${{ inputs.build-number }}

    - name: Tag Docker image
      id: tag
      run: |
        BASE_IMAGE="${{ inputs.registry }}/${{ inputs.image-namespace }}/${{ inputs.image-name }}"

        # Tag with SHA
        IMAGE_SHA_TAG="${BASE_IMAGE}:${{ inputs.commit-sha }}"
        docker tag ${{ inputs.image-name }}:${{ inputs.commit-sha }} "$IMAGE_SHA_TAG"
        echo "image-sha-tag=$IMAGE_SHA_TAG" >> $GITHUB_OUTPUT
        echo "🏷️ Tagged with SHA: $IMAGE_SHA_TAG"

        # Tag with latest
        IMAGE_LATEST_URL="${BASE_IMAGE}:latest"
        docker tag ${{ inputs.image-name }}:${{ inputs.commit-sha }} "$IMAGE_LATEST_URL"
        echo "image-latest-url=$IMAGE_LATEST_URL" >> $GITHUB_OUTPUT
        echo "🏷️ Tagged with: $IMAGE_LATEST_URL"

        # Tag with component version (if provided)
        if [ -n "${{ inputs.component-version }}" ]; then
          IMAGE_VERSION_TAG="${BASE_IMAGE}:${{ steps.compose-version.outputs.version }}"
          docker tag ${{ inputs.image-name }}:${{ inputs.commit-sha }} "$IMAGE_VERSION_TAG"
          echo "image-version-tag=$IMAGE_VERSION_TAG" >> $GITHUB_OUTPUT
          echo "🏷️ Tagged with version: $IMAGE_VERSION_TAG"
        fi
      shell: bash

    - name: Output Summary
      run: |
        echo "📋 Build Outputs Summary:"
        echo "========================="
        echo "🏷️ SHA Tag: ${{ steps.tag.outputs.image-sha-tag }}"
        echo "🏷️ Latest URL: ${{ steps.tag.outputs.image-latest-url }}"
        if [ -n "${{ steps.tag.outputs.image-version-tag }}" ]; then
          echo "🏷️ Version Tag: ${{ steps.tag.outputs.image-version-tag }}"
        fi
        echo "========================="
      shell: bash
