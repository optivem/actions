name: 'Check GitHub Release Exists'
description: 'Checks whether specific GitHub Releases exist for given tag names. Batched, keyed input — paired with callers that need a "release published" signal (e.g. bump-patch-versions for system/meta-level VERSION files). Uses GET /repos/{owner}/{repo}/releases/tags/{tag}: a stricter signal than a raw git tag, since Releases imply intentional publication by the release workflow.'

inputs:
  releases:
    description: 'JSON array of {"key": string, "tag": string} objects. tag is the release tag name (e.g. "meta-v1.0.40", "monolith-java-v1.2.3"). key is opaque and preserved in output.'
    required: true
  repository:
    description: 'Repository in owner/repo format. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'Token used for the Releases API. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  results:
    description: 'JSON array of {"key": string, "exists": boolean} objects. Keys preserved from input.'
    value: ${{ steps.check.outputs.results }}
  any-exist:
    description: '"true" if any input tag has a published Release, "false" otherwise. Convenience flag for guard-style callers.'
    value: ${{ steps.check.outputs.any-exist }}

runs:
  using: 'composite'
  steps:
    - name: Check GitHub Releases
      id: check
      shell: bash
      env:
        RELEASES: ${{ inputs.releases }}
        REPOSITORY: ${{ inputs.repository }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        if ! jq -e 'type == "array"' >/dev/null <<<"$RELEASES"; then
          echo "::error::releases must be a JSON array of {key, tag} objects"
          exit 1
        fi

        output='[]'
        any_exist=false

        while IFS= read -r entry; do
          key=$(jq -r '.key // empty' <<<"$entry")
          tag=$(jq -r '.tag // empty' <<<"$entry")

          if [ -z "$key" ] || [ -z "$tag" ]; then
            echo "::error::Each entry must have non-empty 'key' and 'tag' fields. Got: $entry"
            exit 1
          fi

          stderr_file=$(mktemp)
          if gh_retry api "repos/${REPOSITORY}/releases/tags/${tag}" --silent 2>"$stderr_file"; then
            exists=true
            any_exist=true
            echo "Exists: ${REPOSITORY}@${tag}"
          else
            code=$?
            stderr_content=$(cat "$stderr_file")
            if grep -q "HTTP 404" <<<"$stderr_content"; then
              exists=false
              echo "Missing: ${REPOSITORY}@${tag}"
            else
              echo "::error::Unexpected failure probing release ${REPOSITORY}@${tag} (exit $code): $stderr_content"
              rm -f "$stderr_file"
              exit 1
            fi
          fi
          rm -f "$stderr_file"

          output=$(jq -c --arg key "$key" --argjson exists "$exists" '. + [{key: $key, exists: $exists}]' <<<"$output")
        done < <(jq -c '.[]' <<<"$RELEASES")

        {
          echo "results=$output"
          echo "any-exist=$any_exist"
        } >> "$GITHUB_OUTPUT"
