name: 'Check GHCR Packages Exist'
description: 'Probes GHCR packages to determine whether a tag exists for each. Uses OCI HEAD /manifests/{tag} — works uniformly for user- and org-owned repos and for public and private packages. Two usage shapes: (1) preflight gate — pass URL-only lines and read the any-of "exist" output; (2) per-image probe — pass "image:tag" lines (mixed per-line tags allowed) and read the keyed "results" output. Auth/unexpected-HTTP errors are soft by default (treated as missing); set fail-on-error=true for strict mode.'

inputs:
  image-urls:
    description: 'Newline-separated list of GHCR packages to probe. Each line is either "ghcr.io/{owner}/{repo}/{image}" (uses the default "tag" input) or "ghcr.io/{owner}/{repo}/{image}:{tag}" (per-line tag override). OCI image paths contain no ":" so the tag separator is unambiguous.'
    required: true
  tag:
    description: 'Default tag to probe when a line omits its own ":tag" suffix. Defaults to "latest" — the commit stage always publishes this alongside versioned tags, so "latest" is the reliable "any artifact has been built" signal.'
    required: false
    default: 'latest'
  token:
    description: 'Token used for GHCR authentication. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
  fail-on-error:
    description: 'If "true", fail the step on authentication errors, unexpected HTTP codes, or token-exchange failures. If "false" (default), those conditions emit a warning and the affected entry is reported as exists=false. Strict mode is appropriate for release-gate checks where an auth error must not be silently swallowed.'
    required: false
    default: 'false'

outputs:
  exist:
    description: 'Whether any of the probed packages have the probed tag published (true/false). In soft-fail mode (the default), authentication errors resolve this to false — the downstream stage will surface a clearer error if packages are genuinely missing vs. unauthorized.'
    value: ${{ steps.check.outputs.exist }}
  results:
    description: 'JSON array of {"image": string, "tag": string, "exists": boolean} objects, one entry per input line. "image" is the URL without any ":tag" suffix; "tag" is the effective tag probed (per-line override if given, else the "tag" input default). Preserves input order.'
    value: ${{ steps.check.outputs.results }}

runs:
  using: 'composite'
  steps:
    - name: Probe GHCR for image existence
      id: check
      shell: bash
      env:
        IMAGE_URLS: ${{ inputs.image-urls }}
        TAG: ${{ inputs.tag }}
        GH_TOKEN: ${{ inputs.token }}
        FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      run: |
        set -euo pipefail

        # GHCR OCI reads use a two-step token exchange:
        #   GET /token?scope=repository:<path>:pull  (with Basic auth if token provided) -> bearer token
        #   HEAD /v2/<path>/manifests/<tag>          (with Bearer)
        # This works uniformly for public and private images, and for user- and
        # org-owned repos. Unlike the GitHub Packages REST API (which has
        # path-shape differences between /orgs/{org}/packages and
        # /users/{user}/packages and no repo-scoped list endpoint), the OCI
        # registry treats all three the same way.
        fetch_registry_token() {
          local scope_path=$1
          local url="https://ghcr.io/token?service=ghcr.io&scope=repository:${scope_path}:pull"
          local body
          if [ -n "$GH_TOKEN" ]; then
            body=$(curl -sS -u "x-access-token:${GH_TOKEN}" "$url") || return 1
          else
            body=$(curl -sS "$url") || return 1
          fi
          jq -r '.token // empty' <<<"$body"
        }

        probe_manifest() {
          local url=$1
          local bearer=$2
          local attempt=1
          local max_attempts=4
          local delays=(5 15 45)
          local code

          while (( attempt <= max_attempts )); do
            code=$(curl -sS -L -I -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $bearer" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json" \
              "$url" || echo "000")

            case "$code" in
              200|404|401|403) echo "$code"; return 0 ;;
            esac

            if (( attempt < max_attempts )); then
              local delay_idx=$(( attempt - 1 ))
              (( delay_idx >= ${#delays[@]} )) && delay_idx=$(( ${#delays[@]} - 1 ))
              echo "::notice::[ghcr-probe] attempt $attempt got HTTP $code for $url -- retrying in ${delays[$delay_idx]}s" >&2
              sleep "${delays[$delay_idx]}"
            fi
            (( attempt++ ))
          done

          echo "$code"
        }

        any_exist=false
        checked=0
        results='[]'

        while IFS= read -r line; do
          # Trim whitespace and skip blanks.
          line=$(printf '%s' "$line" | tr -d '[:space:]')
          [ -z "$line" ] && continue

          if [[ "$line" != ghcr.io/* ]]; then
            echo "::error::image-urls entries must begin with 'ghcr.io/'. Got: $line"
            exit 1
          fi

          # Parse optional ":tag" suffix. OCI image paths contain no ":", so
          # splitting on the last ":" is unambiguous.
          if [[ "$line" == *:* ]]; then
            image_url=${line%:*}
            effective_tag=${line##*:}
          else
            image_url=$line
            effective_tag=$TAG
          fi

          checked=$((checked + 1))
          path=${image_url#ghcr.io/}
          manifest_url="https://ghcr.io/v2/${path}/manifests/${effective_tag}"

          exists=false

          bearer=$(fetch_registry_token "$path" || true)
          if [ -z "$bearer" ]; then
            if [ "$FAIL_ON_ERROR" = "true" ]; then
              echo "::error::Failed to obtain GHCR registry token for $path. Check token value and that the package path is correct."
              exit 1
            fi
            echo "::warning::Failed to obtain GHCR registry token for $path — treating as missing."
            results=$(jq -c --arg image "$image_url" --arg tag "$effective_tag" --argjson exists false '. + [{image: $image, tag: $tag, exists: $exists}]' <<<"$results")
            continue
          fi

          code=$(probe_manifest "$manifest_url" "$bearer")
          case "$code" in
            200)
              echo "Exists: ${image_url}:${effective_tag}"
              exists=true
              any_exist=true
              ;;
            404)
              echo "Missing: ${image_url}:${effective_tag}"
              ;;
            401|403)
              if [ "$FAIL_ON_ERROR" = "true" ]; then
                echo "::error::Authentication failed probing ${image_url}:${effective_tag} (HTTP $code). Check token scope (needs read:packages)."
                exit 1
              fi
              echo "::warning::Authentication failed probing ${image_url}:${effective_tag} (HTTP $code). Treating as missing — check token scope (needs read:packages) if images should exist."
              ;;
            *)
              if [ "$FAIL_ON_ERROR" = "true" ]; then
                echo "::error::Unexpected HTTP $code probing ${image_url}:${effective_tag} after retries."
                exit 1
              fi
              echo "::warning::Unexpected HTTP $code probing ${image_url}:${effective_tag} after retries — treating as missing."
              ;;
          esac

          results=$(jq -c --arg image "$image_url" --arg tag "$effective_tag" --argjson exists "$exists" '. + [{image: $image, tag: $tag, exists: $exists}]' <<<"$results")
        done <<< "$IMAGE_URLS"

        if [ "$checked" = "0" ]; then
          echo "::error::image-urls input was empty after trimming."
          exit 1
        fi

        if [ "$any_exist" != "true" ]; then
          echo "::notice::No tag found on any of the $checked probed packages. Commit stage has not produced artifacts yet — skipping."
        fi

        {
          echo "exist=$any_exist"
          echo "results=$results"
        } >> "$GITHUB_OUTPUT"
