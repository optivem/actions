name: 'Check GHCR Packages Exist'
description: 'Checks if container packages exist for the repository using the GitHub Packages API. Useful for skipping pipeline stages when no artifacts have been built yet.'

inputs:
  repository:
    description: 'Repository in owner/repo format to check. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  exist:
    description: 'Whether container artifacts exist for this repository (true/false)'
    value: ${{ steps.check.outputs.exist }}

runs:
  using: 'composite'
  steps:
    - name: Check for container packages
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"
        # `gh api` writes 4xx response bodies to stdout and exits non-zero. A
        # repo with zero container packages returns HTTP 404 — capturing that
        # into `count` via `$(... || echo "0")` would concatenate the JSON
        # error body with "0", producing a non-empty string that falsely
        # signals "packages exist". Capture stdout first, then fall back to 0
        # via a separate assignment so the error body is discarded on failure.
        if response=$(gh_retry api "repos/${REPOSITORY}/packages?package_type=container" 2>/dev/null); then
          count=$(jq 'if type == "array" then length else 0 end' <<<"$response" 2>/dev/null || echo 0)
        else
          count=0
        fi
        if [ "$count" = "0" ] || [ -z "$count" ]; then
          echo "::notice::No container packages found for $REPOSITORY. Commit stage has not produced artifacts yet — skipping."
          echo "exist=false" >> "$GITHUB_OUTPUT"
        else
          echo "Found $count container package(s) for $REPOSITORY."
          echo "exist=true" >> "$GITHUB_OUTPUT"
        fi
