name: 'Check GHCR Packages Exist'
description: 'Probes GHCR packages to determine whether a tag exists for each. Uses OCI HEAD /manifests/{tag} — works uniformly for user- and org-owned repos and for public and private packages. Two usage shapes: (1) preflight gate — pass URL-only lines and read the any-of "exist" output; (2) per-image probe — pass "image:tag" lines (mixed per-line tags allowed) and read the keyed "results" output. Definitive only: HTTP 200 → exists=true, HTTP 404 → exists=false. Anything else (401/403, 5xx after retries, network failure, token-exchange failure) is indeterminate and the action exits 1 with an actionable error — see the no-swallow rule in claude/CLAUDE.md.'

inputs:
  image-urls:
    description: 'Newline-separated list of GHCR packages to probe. Each line is either "ghcr.io/{owner}/{repo}/{image}" (uses the default "tag" input) or "ghcr.io/{owner}/{repo}/{image}:{tag}" (per-line tag override). OCI image paths contain no ":" so the tag separator is unambiguous.'
    required: true
  tag:
    description: 'Default tag to probe when a line omits its own ":tag" suffix. Defaults to "latest" — the commit stage always publishes this alongside versioned tags, so "latest" is the reliable "any artifact has been built" signal.'
    required: false
    default: 'latest'
  token:
    description: 'Token used for GHCR authentication. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  exist:
    description: 'true if any probed package returned HTTP 200 for the probed tag (any-of-published signal); false if every probe returned HTTP 404. Indeterminate cases never reach this output — the action exits 1 instead.'
    value: ${{ steps.check.outputs.exist }}
  results:
    description: 'JSON array of {"image": string, "tag": string, "exists": boolean} objects, one entry per input line. "image" is the URL without any ":tag" suffix; "tag" is the effective tag probed (per-line override if given, else the "tag" input default). Preserves input order. Only emitted when every probe was definitive — otherwise the action exits 1.'
    value: ${{ steps.check.outputs.results }}

runs:
  using: 'composite'
  steps:
    - name: Probe GHCR for image existence
      id: check
      shell: bash
      env:
        IMAGE_URLS: ${{ inputs.image-urls }}
        TAG: ${{ inputs.tag }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        source "$GITHUB_ACTION_PATH/../shared/ghcr-probe.sh"

        any_exist=false
        checked=0
        results='[]'

        while IFS= read -r line; do
          # Trim whitespace and skip blanks.
          line=$(printf '%s' "$line" | tr -d '[:space:]')
          [ -z "$line" ] && continue

          if [[ "$line" != ghcr.io/* ]]; then
            echo "::error::image-urls entries must begin with 'ghcr.io/'. Got: $line"
            exit 1
          fi

          # Parse optional ":tag" suffix. OCI image paths contain no ":", so
          # splitting on the last ":" is unambiguous.
          if [[ "$line" == *:* ]]; then
            image_url=${line%:*}
            effective_tag=${line##*:}
          else
            image_url=$line
            effective_tag=$TAG
          fi

          checked=$((checked + 1))
          path=${image_url#ghcr.io/}
          manifest_url="https://ghcr.io/v2/${path}/manifests/${effective_tag}"

          bearer=$(ghcr_bearer_for "$path" "$GH_TOKEN" || true)
          if [ -z "$bearer" ]; then
            echo "::error::Failed to obtain GHCR registry token for $path. Token missing or invalid — verify the workflow has 'permissions: packages: read' and any custom token secret is current."
            exit 1
          fi

          code=$(ghcr_probe_manifest "$manifest_url" "$bearer")
          case "$code" in
            200)
              echo "Exists: ${image_url}:${effective_tag}"
              exists=true
              any_exist=true
              ;;
            404)
              echo "Missing: ${image_url}:${effective_tag}"
              exists=false
              ;;
            401)
              echo "::error::Unauthenticated probing ${image_url}:${effective_tag} (HTTP 401). The token used by this workflow is missing or invalid — rotate the token or re-authenticate."
              exit 1
              ;;
            403)
              echo "::error::Permission denied probing ${image_url}:${effective_tag} (HTTP 403). The token is valid but lacks 'read:packages' on this package — grant the scope, or ensure the package owner allows this workflow to read it."
              exit 1
              ;;
            *)
              echo "::error::Unexpected HTTP $code probing ${image_url}:${effective_tag} after retries (treat as indeterminate, not as 'absent')."
              exit 1
              ;;
          esac

          results=$(jq -c --arg image "$image_url" --arg tag "$effective_tag" --argjson exists "$exists" '. + [{image: $image, tag: $tag, exists: $exists}]' <<<"$results")
        done <<< "$IMAGE_URLS"

        if [ "$checked" = "0" ]; then
          echo "::error::image-urls input was empty after trimming."
          exit 1
        fi

        if [ "$any_exist" != "true" ]; then
          echo "::notice::No tag found on any of the $checked probed packages — all absent."
        fi

        {
          echo "exist=$any_exist"
          echo "results=$results"
        } >> "$GITHUB_OUTPUT"
