name: 'Compose Prerelease Version'
description: 'Compose a prerelease version string from its parts (target-version, suffix, number, optional prefix). Pure function — no side effects.'

inputs:
  target-version:
    description: 'Target semantic version (e.g., 1.0.0)'
    required: true
  suffix:
    description: 'Prerelease suffix (e.g., rc, dev, alpha, beta)'
    required: true
  number:
    description: 'Counter appended after the suffix (e.g., github.run_number or a build number)'
    required: true
  prefix:
    description: 'Optional prefix prepended to the tag. Produces {prefix}-v{version}-{suffix}.{number} when set, else v{version}-{suffix}.{number}'
    required: false
    default: ''

outputs:
  version:
    description: 'The composed prerelease version string'
    value: ${{ steps.compose.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Compose Prerelease Version
      id: compose
      shell: bash
      env:
        TARGET_VERSION: ${{ inputs.target-version }}
        SUFFIX: ${{ inputs.suffix }}
        NUMBER: ${{ inputs.number }}
        PREFIX: ${{ inputs.prefix }}
      run: |
        set -euo pipefail

        if [[ ! "$TARGET_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid version format: $TARGET_VERSION. Expected: X.Y.Z (e.g., 1.0.0)"
          exit 1
        fi

        if [[ -n "$PREFIX" ]]; then
          version="${PREFIX}-v${TARGET_VERSION}-${SUFFIX}.${NUMBER}"
        else
          version="v${TARGET_VERSION}-${SUFFIX}.${NUMBER}"
        fi

        echo "Composed prerelease version: $version"
        echo "version=$version" >> "$GITHUB_OUTPUT"
