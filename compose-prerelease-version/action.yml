name: 'Compose Prerelease Version'
description: 'Compose a prerelease version string from its parts (base-version, suffix, build-number, optional prefix). Pure function — no side effects.'

inputs:
  base-version:
    description: 'Base semantic version the prerelease parts are appended to (e.g., 1.0.0)'
    required: true
  suffix:
    description: 'Prerelease suffix (e.g., rc, dev, alpha, beta)'
    required: true
  build-number:
    description: 'CI build counter appended after the suffix (e.g., github.run_number). Forms the second dot-separated pre-release identifier per SemVer.'
    required: true
  prefix:
    description: 'Optional prefix prepended to the tag. Produces {prefix}-v{version}-{suffix}.{build-number} when set, else v{version}-{suffix}.{build-number}'
    required: false
    default: ''

outputs:
  version:
    description: 'The composed prerelease version string'
    value: ${{ steps.compose.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Compose Prerelease Version
      id: compose
      shell: bash
      env:
        BASE_VERSION: ${{ inputs.base-version }}
        SUFFIX: ${{ inputs.suffix }}
        BUILD_NUMBER: ${{ inputs.build-number }}
        PREFIX: ${{ inputs.prefix }}
      run: bash "$GITHUB_ACTION_PATH/compose.sh"
