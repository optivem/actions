name: 'Run Docker Compose'
description: 'Starts a Docker Compose stack and waits for the listed systems to respond on HTTP'

inputs:
  environment:
    description: 'Label used in logs to identify the target (e.g., acceptance, qa, production) — display only'
    required: true
  version:
    description: 'Version label used in logs (e.g., v1.0.0-rc.1) — display only'
    required: true
  image-urls:
    description: 'Docker image URLs being run (JSON array format) — surfaced in logs'
    required: true
  compose-file:
    description: 'Docker Compose file to use (e.g., docker-compose.yml)'
    required: false
    default: ''
  system-url:
    description: 'Single health check URL to wait for (e.g., http://localhost:8080/)'
    required: false
    default: ''
  systems:
    description: 'JSON array of systems to health check, each with name and url (e.g., [{"name": "API", "url": "http://localhost:8080/health"}])'
    required: false
    default: ''
  working-directory:
    description: 'Working directory containing the Docker Compose file'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Start Docker Compose
      run: |
        echo "🚀 Starting system version ${{ inputs.version }} for ${{ inputs.environment }}..."
        echo ""

        if [[ -n "${{ inputs.image-urls }}" ]]; then
          echo "📦 Images:"
          echo '${{ inputs.image-urls }}' | jq -r '.[]' | while IFS= read -r image_url; do
            if [[ -n "$image_url" ]]; then
              echo "   🐳 $image_url"
            fi
          done
          echo ""
        fi

        echo "🐳 Running docker compose up..."

        COMPOSE_FILE="${{ inputs.compose-file }}"
        if [[ -n "$COMPOSE_FILE" ]]; then
          echo "📄 Using compose file: $COMPOSE_FILE"
          docker compose -f "$COMPOSE_FILE" up -d
        else
          docker compose up -d
        fi
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    - name: Wait for Systems to be Ready
      run: |
        COMPOSE_FILE="${{ inputs.compose-file }}"
        SYSTEM_URL="${{ inputs.system-url }}"
        SYSTEM_URLS='${{ inputs.systems }}'

        SYSTEMS="[]"

        if [[ -n "$SYSTEM_URL" ]]; then
          SYSTEMS=$(echo "$SYSTEMS" | jq --arg url "$SYSTEM_URL" '. + [{"name": "Application", "url": $url}]')
        fi

        if [[ -n "$SYSTEM_URLS" ]]; then
          SYSTEMS=$(echo "$SYSTEMS" | jq --argjson urls "$SYSTEM_URLS" '. + $urls')
        fi

        COUNT=$(echo "$SYSTEMS" | jq 'length')

        if [[ "$COUNT" -eq 0 ]]; then
          echo "⚠️ No system URLs provided, skipping health checks"
          exit 0
        fi

        echo "⏳ Waiting for $COUNT system(s) to be ready..."
        echo ""

        FAILED=0

        for i in $(seq 0 $((COUNT - 1))); do
          NAME=$(echo "$SYSTEMS" | jq -r ".[$i].name")
          URL=$(echo "$SYSTEMS" | jq -r ".[$i].url")

          echo "⏳ Waiting for $NAME at $URL..."

          max_attempts=30
          wait_seconds=10
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            if curl -f "$URL" > /dev/null 2>&1; then
              echo "✅ $NAME is ready!"
              break
            fi
            echo "🔄 Attempt $attempt/$max_attempts: $NAME not ready yet, waiting $wait_seconds seconds..."
            sleep $wait_seconds
            attempt=$((attempt + 1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "❌ $NAME failed to become ready after $max_attempts attempts"
            FAILED=1
          fi

          echo ""
        done

        if [ $FAILED -eq 1 ]; then
          echo "🔍 Checking Docker Compose container logs:"
          if [[ -n "$COMPOSE_FILE" ]]; then
            docker compose -f "$COMPOSE_FILE" logs --timestamps
          else
            docker compose logs --timestamps
          fi
          echo "🐳 Docker Compose container status:"
          if [[ -n "$COMPOSE_FILE" ]]; then
            docker compose -f "$COMPOSE_FILE" ps
          else
            docker compose ps
          fi
          exit 1
        fi

        echo "✅ All systems are ready!"
      shell: bash
      working-directory: ${{ inputs.working-directory }}
