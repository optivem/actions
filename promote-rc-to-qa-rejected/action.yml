name: 'Promote RC to QA Rejected'
description: 'Records a failed QA signoff by generating a status version and creating a rejection release'

inputs:
  version:
    description: 'The RC version that was tested (e.g., v1.0.4-rc)'
    required: true

outputs:
  version:
    description: 'The generated signoff status version (e.g., v1.0.4-rc-qa-failure)'
    value: ${{ steps.generate-status-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Generate Status Version
      id: generate-status-version
      uses: optivem/actions/generate-status-version@v1
      with:
        version: ${{ inputs.version }}
        environment: qa
        status: failure

    - name: Create Signoff Release
      id: create-release
      uses: optivem/actions/create-release@v1
      with:
        base-version: ${{ inputs.version }}
        release-version: ${{ steps.generate-status-version.outputs.version }}
        environment: qa
        status: failure
        is-prerelease: true
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
