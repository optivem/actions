name: 'Resolve Latest Tag from SHA'
description: 'Finds the highest tag (by version sort) matching a glob pattern that points at a given commit SHA. Tool-agnostic — uses git ls-remote, works against any git remote.'
author: 'Optivem'
branding:
  icon: 'tag'
  color: 'green'

inputs:
  repository:
    description: 'Repository in "owner/name" form (e.g. optivem/shop)'
    required: false
    default: ${{ github.repository }}
  commit-sha:
    description: 'Commit SHA to look up'
    required: true
  pattern:
    description: 'Tag glob pattern (e.g. monolith-typescript-v1.0.26-rc.*)'
    required: true
  token:
    description: 'Token for authenticating to the remote'
    required: false
    default: ${{ github.token }}
  git-host:
    description: 'Git host to query (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'

outputs:
  tag:
    description: 'The highest tag (by version sort) matching the pattern and pointing at the SHA, or empty string if none found'
    value: ${{ steps.resolve.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: bash
      env:
        REPO: ${{ inputs.repository }}
        SHA: ${{ inputs.commit-sha }}
        PATTERN: ${{ inputs.pattern }}
        TOKEN: ${{ inputs.token }}
        GIT_HOST: ${{ inputs.git-host }}
      run: |
        # TODO(scale): git ls-remote --tags fetches the full tag list and filters client-side.
        # For repos with thousands of tags this is slower than a paginated `gh api /repos/.../tags`.
        # At this repo's scale (dozens of tags) it is fine. Revisit when tag counts grow.
        remote_url="https://x-access-token:${TOKEN}@${GIT_HOST}/${REPO}.git"

        # git ls-remote --tags prints: "<sha>\t<ref>".
        # Annotated tags appear twice: once for the tag-object SHA (refs/tags/X) and once
        # peeled to the commit it points at (refs/tags/X^{}). Lightweight tags appear once
        # with the commit SHA directly. Match on the commit SHA; strip the "refs/tags/"
        # prefix and any "^{}" suffix to recover the tag name. Then filter by the caller's
        # glob pattern and pick the highest by version sort.
        TAG=$(
          git ls-remote --tags "$remote_url" | awk -v sha="$SHA" '
            $1 == sha {
              ref = $2
              sub(/^refs\/tags\//, "", ref)
              sub(/\^\{\}$/, "", ref)
              print ref
            }
          ' | while IFS= read -r t; do
            case "$t" in
              $PATTERN) echo "$t" ;;
            esac
          done | sort -V | tail -1
        )

        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        if [ -n "$TAG" ]; then
          echo "Resolved $REPO SHA $SHA to tag: $TAG (pattern: $PATTERN)" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No tag matching '$PATTERN' found in $REPO pointing at $SHA" >> "$GITHUB_STEP_SUMMARY"
        fi
