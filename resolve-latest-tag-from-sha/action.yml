name: 'Resolve Latest Tag from SHA'
description: 'Finds the highest tag (by version sort — `sort -V`) that points at a given commit SHA, optionally filtered by a glob pattern. With the default `pattern: ''*''` returns the highest-version tag among all tags on the SHA. Tool-agnostic — uses git ls-remote, works against any git remote.'

inputs:
  repository:
    description: 'Repository in "owner/name" form (e.g. optivem/shop)'
    required: false
    default: ${{ github.repository }}
  commit-sha:
    description: 'Commit SHA to look up'
    required: true
  pattern:
    description: 'Tag glob pattern to filter by (e.g. `monolith-typescript-v1.0.26-rc.*`). Defaults to `*` which matches any tag.'
    required: false
    default: '*'
  token:
    description: 'Token for authenticating to the remote'
    required: false
    default: ${{ github.token }}
  git-host:
    description: 'Git host to query (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'

outputs:
  tag:
    description: 'The highest tag (by version sort) matching the pattern and pointing at the SHA, or empty string if none found'
    value: ${{ steps.resolve.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: bash
      env:
        REPO: ${{ inputs.repository }}
        SHA: ${{ inputs.commit-sha }}
        PATTERN: ${{ inputs.pattern }}
        TOKEN: ${{ inputs.token }}
        GIT_HOST: ${{ inputs.git-host }}
      run: bash "$GITHUB_ACTION_PATH/resolve.sh"
