name: 'Promote RC to QA Deployed'
description: 'Marks an RC as deployed to QA by generating a status version and creating a deployment release'

inputs:
  version:
    description: 'The RC version that was deployed (e.g., v1.0.4-rc)'
    required: true
  artifact-urls:
    description: 'JSON array of Docker image URLs that were deployed'
    required: true

outputs:
  version:
    description: 'The generated deployment status version (e.g., v1.0.4-rc-qa-deployed)'
    value: ${{ steps.generate-status-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Generate Status Version
      id: generate-status-version
      uses: optivem/actions/generate-status-version@v1
      with:
        version: ${{ inputs.version }}
        environment: qa
        status: deployed

    - name: Create Deployment Release
      id: create-release
      uses: optivem/actions/create-release@v1
      with:
        base-version: ${{ inputs.version }}
        release-version: ${{ steps.generate-status-version.outputs.version }}
        environment: qa
        status: deployed
        artifact-urls: ${{ inputs.artifact-urls }}
        is-prerelease: true
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
