name: 'Resolve Latest Deployed Prerelease'
description: 'Finds the most recent successful deployment in a given environment whose ref matches a strict prerelease <ref-prefix><X.Y.Z>-rc.<N> pattern, optionally excluding refs that start with another prefix (cloud/non-cloud sharing one environment). Returns the deployment ref. Pairs with create-deployment (write), and parallels resolve-latest-prerelease-tag (same noun, different qualifier).'

inputs:
  environment:
    description: 'Deployment environment to query (e.g. "monolith-dotnet-qa").'
    required: true
  ref-prefix:
    description: 'Required prefix on the deployment ref (e.g. "monolith-dotnet-v"). Only deployments whose ref matches "<ref-prefix><X.Y.Z>-rc.<N>" exactly are considered — legacy status-suffix tags (e.g. -qa-deployed) are excluded by the strict regex.'
    required: true
  exclude-ref-prefix:
    description: 'Optional. If set, deployments with refs starting with this string are excluded. Useful when cloud and non-cloud variants share one environment but use distinct ref prefixes (e.g. exclude "monolith-dotnet-cloud-v" when looking up the non-cloud variant).'
    required: false
    default: ''
  repository:
    description: 'Repository in owner/name form. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token used for API calls. Needs deployments:read. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  ref:
    description: 'The ref of the latest successful deployment matching the criteria. Empty when none found (in which case the action also fails the step).'
    value: ${{ steps.resolve.outputs.ref }}

runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        ENVIRONMENT: ${{ inputs.environment }}
        REF_PREFIX: ${{ inputs.ref-prefix }}
        EXCLUDE_REF_PREFIX: ${{ inputs.exclude-ref-prefix }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        ref_regex="^${REF_PREFIX}[0-9]+\\.[0-9]+\\.[0-9]+-rc\\.[0-9]+$"

        page=1
        while [[ "$page" -le 10 ]]; do
          mapfile -t entries < <(gh_retry api "repos/${REPOSITORY}/deployments?environment=${ENVIRONMENT}&per_page=100&page=${page}" \
            --jq '.[] | "\(.id)|\(.ref)"')
          [[ ${#entries[@]} -eq 0 ]] && break
          for entry in "${entries[@]}"; do
            id="${entry%%|*}"
            ref="${entry##*|}"
            [[ "$ref" =~ $ref_regex ]] || continue
            if [[ -n "$EXCLUDE_REF_PREFIX" && "$ref" == "$EXCLUDE_REF_PREFIX"* ]]; then
              continue
            fi
