name: 'Check Target Version Exists'
description: 'Checks whether a VERSION file exists in the repository. Fails if the file is not found.'

inputs:
  file:
    description: 'Path to the VERSION file'
    required: false
    default: 'VERSION'

outputs:
  exists:
    description: 'Whether the VERSION file exists (true or false)'
    value: ${{ steps.check.outputs.exists }}

runs:
  using: 'composite'
  steps:
    - name: Check Version File
      id: check
      shell: bash
      run: |
        if [ -f "${{ inputs.file }}" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "VERSION file found at '${{ inputs.file }}'."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::error::VERSION file not found at '${{ inputs.file }}'. Make sure to include the VERSION file in your repository."
          exit 1
        fi
