name: 'Resolve Commit'
description: 'Resolves a git ref (branch, tag, or SHA) in a remote repository to its commit SHA and committer timestamp. Tool-agnostic — uses git fetch + git log, works against any git remote that allows reachable-SHA fetches.'

inputs:
  repository:
    description: 'Repository in "owner/name" form (e.g. optivem/shop). Resolved against the configured git-host (defaults to github.com).'
    required: true
  ref:
    description: 'Git ref to resolve (branch, tag, or SHA). Empty defaults to "main".'
    required: false
    default: 'main'
  token:
    description: 'Token for authenticating to the remote'
    required: false
    default: ${{ github.token }}
  git-host:
    description: 'Git host to query (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'

outputs:
  sha:
    description: '40-character commit SHA'
    value: ${{ steps.resolve.outputs.sha }}
  timestamp:
    description: 'Committer timestamp in ISO 8601 format'
    value: ${{ steps.resolve.outputs.timestamp }}

runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: bash
      env:
        REPO: ${{ inputs.repository }}
        REF: ${{ inputs.ref }}
        TOKEN: ${{ inputs.token }}
        GIT_HOST: ${{ inputs.git-host }}
      run: bash "$GITHUB_ACTION_PATH/resolve.sh"
