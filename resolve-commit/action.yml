name: 'Resolve Commit'
description: 'Resolves a git ref (branch, tag, or SHA) in a GitHub repository to its commit SHA and committer timestamp.'
author: 'Optivem'
branding:
  icon: 'git-commit'
  color: 'green'
inputs:
  repo:
    description: 'Repository in "owner/name" form (e.g. optivem/shop)'
    required: true
  ref:
    description: 'Git ref to resolve (branch, tag, or SHA). Empty defaults to "main".'
    required: false
    default: 'main'
outputs:
  sha:
    description: '40-character commit SHA'
    value: ${{ steps.resolve.outputs.sha }}
  timestamp:
    description: 'Committer timestamp in ISO 8601 format'
    value: ${{ steps.resolve.outputs.timestamp }}
runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: bash
      run: |
        REPO="${{ inputs.repo }}"
        REF="${{ inputs.ref }}"
        if [ -z "$REF" ]; then
          REF="main"
        fi

        COMMIT_JSON=$(gh api "repos/$REPO/commits/$REF")
        SHA=$(echo "$COMMIT_JSON" | jq -r '.sha')
        TIMESTAMP=$(echo "$COMMIT_JSON" | jq -r '.commit.committer.date')

        if [ -z "$SHA" ] || [ ${#SHA} -ne 40 ]; then
          echo "::error::Failed to resolve $REPO ref '$REF'"
          exit 1
        fi

        echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
        echo "Resolved $REPO ref '$REF' to SHA: $SHA" >> "$GITHUB_STEP_SUMMARY"
        echo "Committer timestamp: $TIMESTAMP" >> "$GITHUB_STEP_SUMMARY"
