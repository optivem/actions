name: 'Check SHA On Branch'
description: 'Checks whether a given commit SHA is an ancestor of a branch (default: main). Outputs on-branch=true/false. Use to guard downstream steps against workflow_dispatch inputs pointing at commits not in the base branch.'

inputs:
  commit-sha:
    description: 'Git SHA to check. Defaults to github.sha.'
    required: false
    default: ${{ github.sha }}
  base-branch:
    description: 'Base branch to check ancestry against.'
    required: false
    default: 'main'

outputs:
  on-branch:
    description: 'true if the SHA is an ancestor of the base branch, false otherwise'
    value: ${{ steps.check.outputs.on-branch }}

runs:
  using: 'composite'
  steps:
    - id: check
      shell: bash
      env:
        SHA: ${{ inputs.commit-sha }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: bash "$GITHUB_ACTION_PATH/check.sh"
