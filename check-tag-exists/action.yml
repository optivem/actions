name: 'Check Tag Exists'
description: 'Checks whether a tag exists in the remote repository. Accepts either an exact tag (e.g. monolith-java-v1.0.0) or a glob pattern (e.g. meta-v*). Tool-agnostic — uses git ls-remote, no platform API dependency.'

inputs:
  tag:
    description: 'Exact tag or glob pattern to match (e.g., monolith-java-v1.0.0 or meta-v*)'
    required: true
  repository:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'Token for authenticating to the remote'
    required: false
    default: ${{ github.token }}
  git-host:
    description: 'Git host to query (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'

outputs:
  exists:
    description: 'Whether at least one matching tag exists (true/false)'
    value: ${{ steps.check.outputs.exists }}

runs:
  using: 'composite'
  steps:
    - name: Check tag
      id: check
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
        REPO: ${{ inputs.repository }}
        TOKEN: ${{ inputs.token }}
        GIT_HOST: ${{ inputs.git-host }}
      run: bash "$GITHUB_ACTION_PATH/check.sh"
