name: 'Check Timestamp Newer'
description: 'Pure ISO 8601 timestamp comparator. Outputs newer=true when `latest` is strictly newer than `since`, OR when `since` is empty (fail-open). Outputs newer=false when `since` is set and `latest` is not newer.'

inputs:
  latest:
    description: 'ISO 8601 timestamp under observation (e.g. latest docker image push time, latest artifact build time, latest commit timestamp). Required.'
    required: true
  since:
    description: 'ISO 8601 timestamp to compare against (typically the last-run timestamp). When empty, the action returns newer=true (fail-open — useful for "first run" semantics).'
    required: false
    default: ''

outputs:
  newer:
    description: |
      'true' when `latest` is strictly newer than `since`,
      OR when `since` is empty (fail-open).
      'false' when `since` is set AND `latest` is not newer than it.
    value: ${{ steps.check.outputs.newer }}

runs:
  using: 'composite'
  steps:
    - name: Compare latest timestamp against since
      id: check
      shell: bash
      env:
        LATEST: ${{ inputs.latest }}
        SINCE: ${{ inputs.since }}
      run: bash "$GITHUB_ACTION_PATH/check.sh"
