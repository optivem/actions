name: 'Create Component Tags'
description: 'For each "component-name:version-file-path" entry, reads the VERSION file and creates + pushes a git tag "{component-name}-v{version}". Idempotent — skips tags that already exist on the remote, tolerates concurrent creation. Tool-agnostic — uses git commands only.'

inputs:
  components:
    description: 'Newline-separated list of "component-name:version-file-path" entries (e.g., monolith-system-java:system/monolith/java/VERSION)'
    required: true
  repository:
    description: 'Repository in owner/repo format. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  git-host:
    description: 'Git host to push to (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'
  token:
    description: 'Token used to push tags. Defaults to the workflow-scoped GITHUB_TOKEN. Pass a PAT or GitHub App token with workflows:write when the tagged commit contains workflow file changes that differ from the default branch — GITHUB_TOKEN cannot push such refs.'
    required: false
    default: ${{ github.token }}

outputs:
  created-tags:
    description: 'JSON array of tag names newly pushed by this run (includes tags created by concurrent runs pointing to the same commit).'
    value: ${{ steps.create.outputs.created-tags }}
  skipped-tags:
    description: 'JSON array of tag names that already existed on the remote and were skipped.'
    value: ${{ steps.create.outputs.skipped-tags }}

runs:
  using: 'composite'
  steps:
    - name: Create Component Tags
      id: create
      shell: bash
      env:
        COMPONENTS: ${{ inputs.components }}
        REPO: ${{ inputs.repository }}
        GIT_HOST: ${{ inputs.git-host }}
        TOKEN: ${{ inputs.token }}
      run: |
        source "$GITHUB_ACTION_PATH/../shared/remote-url.sh"
        source "$GITHUB_ACTION_PATH/../shared/clear-persisted-credentials.sh"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        push_target=$(remote_push_target "$TOKEN" "$GIT_HOST" "$REPO")
        query_url=$(remote_query_url "$TOKEN" "$GIT_HOST" "$REPO")
        if [ -n "$TOKEN" ]; then
          clear_persisted_credentials "$GIT_HOST"
        fi

        created_tags=()
        skipped_tags=()

        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          component_name="${line%%:*}"
          version_file="${line#*:}"

          if [[ ! -f "$version_file" ]]; then
            echo "::warning::VERSION file not found: $version_file"
            continue
          fi

          version=$(cat "$version_file" | tr -d '[:space:]')
          component_tag="${component_name}-v${version}"

          if git ls-remote --tags --exit-code "$query_url" "refs/tags/$component_tag" >/dev/null 2>&1; then
            echo "Skipped $component_name: tag $component_tag already exists on remote"
            skipped_tags+=("$component_tag")
            continue
          fi

          git tag "$component_tag"
          push_stderr=$(mktemp)
          if git push "$push_target" "$component_tag" 2>"$push_stderr"; then
            rm -f "$push_stderr"
            echo "Created component tag: $component_tag"
            created_tags+=("$component_tag")
            continue
          fi

          remote_sha=$(git ls-remote --tags "$query_url" "refs/tags/$component_tag" | cut -f1)
          local_sha=$(git rev-parse "$component_tag")
          if [[ -n "$remote_sha" && "$remote_sha" == "$local_sha" ]]; then
            rm -f "$push_stderr"
            echo "Tag $component_tag created by concurrent run (same commit)"
            created_tags+=("$component_tag")
          else
            echo "::error::Failed to push tag $component_tag (remote: $remote_sha, local: $local_sha)"
            cat "$push_stderr" >&2
            rm -f "$push_stderr"
            exit 1
          fi
        done <<< "$COMPONENTS"

        to_json_array() {
          if (( $# == 0 )); then
            echo '[]'
          else
            printf '%s\n' "$@" | jq -R . | jq -s -c .
          fi
        }

        {
          echo "created-tags=$(to_json_array "${created_tags[@]}")"
          echo "skipped-tags=$(to_json_array "${skipped_tags[@]}")"
        } >> "$GITHUB_OUTPUT"
