name: 'Create Component Tags'
description: 'For each "component-name:version-file-path" entry, reads the VERSION file and creates + pushes a git tag "{component-name}-v{version}". Idempotent — skips tags that already exist on the remote, tolerates concurrent creation. Tool-agnostic — uses git commands only.'
author: 'Optivem'
branding:
  icon: 'tag'
  color: 'green'

inputs:
  components:
    description: 'Newline-separated list of "component-name:version-file-path" entries (e.g., monolith-system-java:system/monolith/java/VERSION)'
    required: true
  repository:
    description: 'Repository in owner/repo format. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  git-host:
    description: 'Git host to push to (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'
  token:
    description: 'Token used to push tags. Defaults to the workflow-scoped GITHUB_TOKEN. Pass a PAT or GitHub App token with workflows:write when the tagged commit contains workflow file changes that differ from the default branch — GITHUB_TOKEN cannot push such refs.'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Create Component Tags
      shell: bash
      env:
        COMPONENTS: ${{ inputs.components }}
        REPO: ${{ inputs.repository }}
        GIT_HOST: ${{ inputs.git-host }}
        TOKEN: ${{ inputs.token }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        if [ -n "$TOKEN" ]; then
          push_target="https://x-access-token:${TOKEN}@${GIT_HOST}/${REPO}.git"
        else
          push_target="origin"
        fi

        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          component_name="${line%%:*}"
          version_file="${line#*:}"

          if [[ ! -f "$version_file" ]]; then
            echo "::warning::VERSION file not found: $version_file"
            continue
          fi

          version=$(cat "$version_file" | tr -d '[:space:]')
          component_tag="${component_name}-v${version}"

          if git ls-remote --tags --exit-code origin "refs/tags/$component_tag" >/dev/null 2>&1; then
            echo "Skipped $component_name: tag $component_tag already exists on remote"
            continue
          fi

          git tag "$component_tag"
          if git push "$push_target" "$component_tag" 2>/dev/null; then
            echo "Created component tag: $component_tag"
            continue
          fi

          remote_sha=$(git ls-remote --tags origin "refs/tags/$component_tag" | cut -f1)
          local_sha=$(git rev-parse "$component_tag")
          if [[ -n "$remote_sha" && "$remote_sha" == "$local_sha" ]]; then
            echo "Tag $component_tag created by concurrent run (same commit)"
          else
            echo "::error::Failed to push tag $component_tag (remote: $remote_sha, local: $local_sha)"
            exit 1
          fi
        done <<< "$COMPONENTS"
