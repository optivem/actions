name: 'Resolve Docker Images'
description: 'Resolves base image URLs to versioned URLs and validates they exist'
author: 'Optivem'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  tag:
    description: 'Tag to append to base image URLs (e.g., v1.0.0-rc.1)'
    required: true
  base-image-urls:
    description: 'Base image URLs (without tag). Accepts either JSON array format or newline-separated list'
    required: true

outputs:
  image-urls:
    description: 'JSON array of resolved image URLs with tags'
    value: ${{ steps.resolve-images.outputs.image-urls }}

runs:
  using: 'composite'
  steps:
    - name: Resolve Docker Images
      id: resolve-images
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
        BASE_IMAGE_URLS: ${{ inputs.base-image-urls }}
      run: bash "${{ github.action_path }}/resolve-docker-images.sh"
