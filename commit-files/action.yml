name: 'Commit Files'
description: 'GitHub-API primitive: writes a set of files to a branch via the Contents API with SHA preconditions, retrying on conflict. Race-safe alternative to `git push` for workflows that may run concurrently on the same branch.'

inputs:
  files:
    description: 'JSON array of `{path, content, message}` entries. `path` is repo-relative, `content` is the full new file content (plain text, will be base64-encoded before PUT), `message` is the commit message for that file.'
    required: true
  branch:
    description: 'Branch to commit to. Required — pass explicitly (e.g. `main`). Do not rely on `github.ref_name`: on tag pushes it is the tag name, and on `workflow_call`/`workflow_dispatch` it is the caller/dispatcher ref, neither of which is a safe commit target.'
    required: true
  max-retries:
    description: 'Maximum number of retries per file on SHA-precondition conflict (HTTP 409/422)'
    required: false
    default: '3'
  token:
    description: 'GitHub token with contents:write permission on the target branch. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  commits:
    description: 'JSON array of `{path, commit-sha, content-sha, html-url}` for each file that was committed'
    value: ${{ steps.commit.outputs.commits }}
  committed:
    description: 'true if at least one file was committed'
    value: ${{ steps.commit.outputs.committed }}

runs:
  using: 'composite'
  steps:
    - name: Commit Files
      id: commit
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        FILES_JSON: ${{ inputs.files }}
        BRANCH: ${{ inputs.branch }}
        REPOSITORY: ${{ github.repository }}
        MAX_RETRIES: ${{ inputs.max-retries }}
      run: bash "$GITHUB_ACTION_PATH/commit.sh"
