name: 'Compose Docker Image URLs'
description: 'String-composition helper. Takes base image URLs and a tag, returns a JSON array of `{base}:{tag}` URLs. No registry lookup (see `resolve-docker-image-digests` for that).'

inputs:
  tag:
    description: 'Tag to append to base image URLs (e.g., v1.0.0-rc.1)'
    required: true
  base-image-urls:
    description: 'Base image URLs (without tag). Accepts either JSON array format or newline-separated list'
    required: true

outputs:
  image-urls:
    description: 'JSON array of resolved image URLs with tags'
    value: ${{ steps.resolve-images.outputs.image-urls }}

runs:
  using: 'composite'
  steps:
    - name: Compose Docker Image URLs
      id: resolve-images
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
        BASE_IMAGE_URLS: ${{ inputs.base-image-urls }}
      run: bash "${{ github.action_path }}/compose-docker-image-urls.sh"
