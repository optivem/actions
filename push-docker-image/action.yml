name: 'Push Docker Image'
description: 'Pushes a pre-built Docker image to a container registry'
author: 'Optivem'
branding:
  icon: 'upload-cloud'
  color: 'blue'
inputs:
  image-sha-tag:
    description: 'Full image reference tagged with commit SHA (output from build-docker-image)'
    required: true
  image-latest-url:
    description: 'Full image reference tagged with latest tag (output from build-docker-image)'
    required: true
  registry:
    description: 'Container registry URL (e.g., ghcr.io, docker.io, gcr.io)'
    required: false
    default: 'ghcr.io'
  image-version-tag:
    description: 'Full image reference tagged with component version (output from build-docker-image). Optional.'
    required: false
    default: ''
  registry-username:
    description: 'Username for registry authentication'
    required: false
    default: '${{ github.actor }}'
  token:
    description: 'Token for registry authentication. Defaults to github.token for GHCR pushes.'
    required: false
    default: '${{ github.token }}'
outputs:
  image-digest-url:
    description: 'Full image URL with SHA256 digest'
    value: '${{ steps.push.outputs.image-digest-url }}'
runs:
  using: 'composite'
  steps:
    - name: Echo Information
      run: |
        echo "📤 Starting Docker push action"
        echo "🏷️ SHA Tag: $IMAGE_SHA_TAG"
        echo "🏷️ Latest URL: $IMAGE_LATEST_URL"
        if [ -n "$IMAGE_VERSION_TAG" ]; then
          echo "🏷️ Version Tag: $IMAGE_VERSION_TAG"
        fi
        echo "🌐 Registry: $REGISTRY"
        echo "👤 Username: $REGISTRY_USERNAME"
      shell: bash
      env:
        IMAGE_SHA_TAG: ${{ inputs.image-sha-tag }}
        IMAGE_LATEST_URL: ${{ inputs.image-latest-url }}
        IMAGE_VERSION_TAG: ${{ inputs.image-version-tag }}
        REGISTRY: ${{ inputs.registry }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}

    - name: Log in to Container Registry
      run: |
        echo "🔐 Logging in to $REGISTRY..."
        echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
        echo "✅ Successfully logged in to registry"
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_TOKEN: ${{ inputs.token }}

    - name: Push Docker image
      id: push
      run: |
        echo "📤 Pushing Docker images..."

        push_with_retry() {
          local image="$1"
          local max_attempts=3
          local attempt
          for attempt in $(seq 1 $max_attempts); do
            set +e
            docker push "$image"
            local rc=$?
            set -e
            if [ $rc -eq 0 ]; then
              return 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "⚠️ Push failed (attempt $attempt/$max_attempts), retrying in 10s..."
              sleep 10
            fi
          done
          echo "❌ Push failed after $max_attempts attempts"
          return 1
        }

        DIGEST=$(docker push "$IMAGE_SHA_TAG" | grep -oP 'sha256:[a-f0-9]{64}' | head -n1)
        echo "✅ Pushed SHA tagged image: $IMAGE_SHA_TAG"
        echo "📝 Image digest: $DIGEST"

        push_with_retry "$IMAGE_LATEST_URL"
        echo "✅ Pushed tagged image: $IMAGE_LATEST_URL"

        if [ -n "$IMAGE_VERSION_TAG" ]; then
          push_with_retry "$IMAGE_VERSION_TAG"
          echo "✅ Pushed version tagged image: $IMAGE_VERSION_TAG"
        fi

        BASE_IMAGE=$(echo "$IMAGE_SHA_TAG" | sed 's/:[^:]*$//')
        IMAGE_DIGEST_URL="${BASE_IMAGE}@${DIGEST}"
        echo "image-digest-url=$IMAGE_DIGEST_URL" >> "$GITHUB_OUTPUT"

        echo "🎉 Successfully pushed all Docker images to $REGISTRY"
      shell: bash
      env:
        IMAGE_SHA_TAG: ${{ inputs.image-sha-tag }}
        IMAGE_LATEST_URL: ${{ inputs.image-latest-url }}
        IMAGE_VERSION_TAG: ${{ inputs.image-version-tag }}
        REGISTRY: ${{ inputs.registry }}

    - name: Output Summary
      run: |
        echo "📋 Push Outputs Summary:"
        echo "========================="
        echo "🔗 SHA Tag: $IMAGE_SHA_TAG"
        echo "🔗 Latest URL: $IMAGE_LATEST_URL"
        if [ -n "$IMAGE_VERSION_TAG" ]; then
          echo "🔗 Version Tag: $IMAGE_VERSION_TAG"
        fi
        echo "🔗 Digest URL: $IMAGE_DIGEST_URL"
        echo "========================="
      shell: bash
      env:
        IMAGE_SHA_TAG: ${{ inputs.image-sha-tag }}
        IMAGE_LATEST_URL: ${{ inputs.image-latest-url }}
        IMAGE_VERSION_TAG: ${{ inputs.image-version-tag }}
        IMAGE_DIGEST_URL: ${{ steps.push.outputs.image-digest-url }}
