name: 'Resolve Docker Image Digests'
description: 'Finds Docker images and resolves their digests from any container registry. Takes base image URLs plus a tag — the action appends ":tag" to each base URL and resolves the digest. Callers own the tag convention (e.g. "latest", "sha-<sha>", "v1.2.3").'
inputs:
  base-image-urls:
    description: 'Base image URLs (no :tag). Combined with tag to produce the image reference. Supports newline-separated list or JSON array format.'
    required: true
  tag:
    description: 'Image tag to resolve (e.g. "latest", "sha-<sha>", "v1.2.3"). Appended after ":" to each base URL.'
    required: false
    default: 'latest'
outputs:
  image-digest-urls:
    description: 'JSON array of digest URLs in the same order as input'
    value: ${{ steps.get-digests.outputs.digests }}
  latest-updated-at:
    description: 'ISO 8601 timestamp of the most recently created image among all processed images'
    value: ${{ steps.get-digests.outputs.latest-updated-at }}
runs:
  using: 'composite'
  steps:
    - name: Resolve image digests
      id: get-digests
      shell: bash
      env:
        BASE_IMAGE_URLS: ${{ inputs.base-image-urls }}
        TAG: ${{ inputs.tag }}
      run: bash "${{ github.action_path }}/resolve-docker-image-digests.sh"
