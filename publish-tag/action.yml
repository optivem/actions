name: 'Publish Tag'
description: 'Publishes a git tag to origin at a given commit SHA (or current HEAD), using the github-actions[bot] identity. Idempotent — no-ops if the tag already exists at the same commit, tolerates concurrent creation, fails hard only if the remote tag points at a different commit.'
inputs:
  tag:
    description: 'Git tag name to create (e.g., v1.0.3-rc.1)'
    required: true
  commit-sha:
    description: 'Commit SHA to tag. Empty = current HEAD.'
    required: false
    default: ''
  repository:
    description: 'Repository in owner/repo format. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  git-host:
    description: 'Git host to push to (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'
  token:
    description: 'Token used to push the tag. Defaults to the workflow-scoped GITHUB_TOKEN. Pass a PAT or GitHub App token with workflows:write when the tagged commit contains workflow file changes that differ from the default branch — GITHUB_TOKEN cannot push such refs.'
    required: false
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - id: tag
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
        SHA: ${{ inputs.commit-sha }}
        REPO: ${{ inputs.repository }}
        GIT_HOST: ${{ inputs.git-host }}
        TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        target_sha="${SHA:-$(git rev-parse HEAD)}"

        if [ -n "$TOKEN" ]; then
          push_target="https://x-access-token:${TOKEN}@${GIT_HOST}/${REPO}.git"
          # actions/checkout persists GITHUB_TOKEN differently by version: @v5 and earlier
          # use http.<host>.extraheader; @v6 uses includeIf.gitdir:<path>.path pointing to a
          # credentials config file. Clear both so git push uses only the URL-embedded token.
          git config --local --unset-all "http.https://${GIT_HOST}/.extraheader" 2>/dev/null || true
          while IFS= read -r key; do
            [ -n "$key" ] && git config --local --unset-all "$key" 2>/dev/null || true
          done < <(git config --local --name-only --get-regexp '^includeIf\.gitdir:' 2>/dev/null || true)
        else
          push_target="origin"
        fi

        existing=$(git ls-remote --tags origin "refs/tags/$TAG" | cut -f1)
        if [ -n "$existing" ]; then
          if [ "$existing" = "$target_sha" ]; then
            echo "Tag $TAG already exists on remote at $target_sha — no-op"
            echo "Tag $TAG already existed at $target_sha (no-op)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "::error::Tag $TAG already exists on remote at $existing, but caller requested $target_sha"
          exit 1
        fi

        if [ -n "$SHA" ]; then
          git tag "$TAG" "$SHA"
        else
          git tag "$TAG"
        fi

        if git push "$push_target" "$TAG"; then
          echo "Created and pushed tag $TAG at $target_sha" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        remote_sha=$(git ls-remote --tags origin "refs/tags/$TAG" | cut -f1)
        if [ -n "$remote_sha" ] && [ "$remote_sha" = "$target_sha" ]; then
          echo "Tag $TAG created by concurrent run at same commit — tolerating"
          echo "Tag $TAG created by concurrent run at $target_sha" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        echo "::error::Failed to push tag $TAG (remote: $remote_sha, local: $target_sha)"
        exit 1
