name: 'Resolve Latest Prerelease Tag'
description: 'Finds the latest git tag in a GitHub repository that matches a given prefix (and optional suffix), using version-aware sort. Tool-agnostic — uses git ls-remote, no releases API dependency. Pairs with validate-tag-exists for the "validate an explicit tag" case.'
author: 'Optivem'
branding:
  icon: 'tag'
  color: 'green'

inputs:
  tag-prefix:
    description: 'Required tag prefix (e.g. "monolith-java-v"). Tags matching "${tag-prefix}*${tag-suffix}" are considered; the highest by version-aware sort wins.'
    required: true
  tag-suffix:
    description: 'Optional tag suffix (e.g. "-qa-approved"). When set, only tags that also end with this suffix are considered, and the base-tag output contains the matched tag with the suffix stripped.'
    required: false
    default: ''
  repository:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'Token for authenticating to the remote'
    required: false
    default: ${{ github.token }}
  git-host:
    description: 'Git host to query (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'

outputs:
  tag:
    description: 'The latest tag matching tag-prefix (and tag-suffix, if provided)'
    value: ${{ steps.resolve.outputs.tag }}
  base-tag:
    description: 'The matched tag with tag-suffix stripped (equals tag when tag-suffix is empty)'
    value: ${{ steps.resolve.outputs.base-tag }}

runs:
  using: 'composite'
  steps:
    - id: resolve
      shell: bash
      env:
        PREFIX: ${{ inputs.tag-prefix }}
        SUFFIX: ${{ inputs.tag-suffix }}
        REPO: ${{ inputs.repository }}
        TOKEN: ${{ inputs.token }}
        GIT_HOST: ${{ inputs.git-host }}
      run: |
        set -euo pipefail

        if [ -z "$PREFIX" ]; then
          echo "::error::tag-prefix is required."
          exit 1
        fi

        if [ -n "$TOKEN" ]; then
          remote_url="https://x-access-token:${TOKEN}@${GIT_HOST}/${REPO}.git"
        else
          remote_url="https://${GIT_HOST}/${REPO}.git"
        fi

        if [ -n "$SUFFIX" ]; then
          pattern="refs/tags/${PREFIX}*${SUFFIX}"
          label="${PREFIX}*${SUFFIX}"
        else
          pattern="refs/tags/${PREFIX}*"
          label="${PREFIX}*"
        fi

        TAG=$(git ls-remote --tags "$remote_url" "$pattern" 2>/dev/null \
          | awk '{print $2}' \
          | sed 's#refs/tags/##' \
          | grep -v '\^{}$' \
          | sort -V \
          | tail -n 1)

        if [ -z "$TAG" ]; then
          echo "::error::No ${label} git tag found in $REPO — create a ${label} tag first, or pass an explicit tag elsewhere."
          exit 1
        fi

        if [ -n "$SUFFIX" ]; then
          BASE_TAG="${TAG%$SUFFIX}"
        else
          BASE_TAG="$TAG"
        fi

        echo "Resolved latest ${label} git tag in $REPO: $TAG"
        echo "Using latest ${label} git tag from $REPO: $TAG" >> "$GITHUB_STEP_SUMMARY"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "base-tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
