name: 'Promote RC to Production Deployed'
description: 'Promotes an RC to production by generating a release version, tagging Docker images, and creating a production release'

inputs:
  version:
    description: 'The RC version that was deployed (e.g., v1.0.0-rc.1)'
    required: true
  artifact-urls:
    description: 'JSON array of Docker image URLs that were deployed'
    required: true
  component-versions:
    description: 'Newline-separated list of component-name:version-file-path pairs (e.g., multitier-backend-java:system/multitier/backend-java/VERSION)'
    required: false
    default: ''

outputs:
  version:
    description: 'The generated production release version (e.g., v1.0.0)'
    value: ${{ steps.generate-release-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Generate Release Version
      id: generate-release-version
      uses: optivem/actions/generate-release-version@v1
      with:
        prerelease-version: ${{ inputs.version }}

    - name: Tag Docker Images
      id: tag-images
      uses: optivem/actions/tag-docker-images@v1
      with:
        image-urls: ${{ inputs.artifact-urls }}
        tag: ${{ steps.generate-release-version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: Create Production Release
      id: create-release
      uses: optivem/actions/create-release@v1
      with:
        base-version: ${{ inputs.version }}
        release-version: ${{ steps.generate-release-version.outputs.version }}
        environment: prod
        status: deployed
        artifact-urls: ${{ steps.tag-images.outputs.image-urls }}
        is-prerelease: false
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: Tag Component Versions
      if: inputs.component-versions != ''
      shell: bash
      run: |
        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          component_name="${line%%:*}"
          version_file="${line#*:}"

          if [[ ! -f "$version_file" ]]; then
            echo "::warning::VERSION file not found: $version_file"
            continue
          fi

          version=$(cat "$version_file" | tr -d '[:space:]')
          component_tag="${component_name}-v${version}"

          if git ls-remote --tags --exit-code origin "refs/tags/$component_tag" >/dev/null 2>&1; then
            echo "Skipped $component_name: tag $component_tag already exists on remote"
          else
            git tag "$component_tag"
            if git push origin "$component_tag" 2>/dev/null; then
              echo "Created component tag: $component_tag"
            else
              remote_sha=$(git ls-remote --tags origin "refs/tags/$component_tag" | cut -f1)
              local_sha=$(git rev-parse "$component_tag")
              if [[ -n "$remote_sha" && "$remote_sha" == "$local_sha" ]]; then
                echo "Tag $component_tag created by concurrent run (same commit)"
              else
                echo "::error::Failed to push tag $component_tag (remote: $remote_sha, local: $local_sha)"
                exit 1
              fi
            fi
          fi
        done <<< "${{ inputs.component-versions }}"
