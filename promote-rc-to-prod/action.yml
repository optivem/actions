name: 'Promote RC to Production Deployed'
description: 'Promotes an RC to production by generating a release version, tagging Docker images, and creating a production release'

inputs:
  version:
    description: 'The RC version that was deployed (e.g., v1.0.0-rc.1)'
    required: true
  artifact-urls:
    description: 'JSON array of Docker image URLs that were deployed'
    required: true
  component-versions:
    description: 'Newline-separated list of component-name:version-file-path pairs (e.g., multitier-backend-java:system/multitier/backend-java/VERSION)'
    required: false
    default: ''

outputs:
  version:
    description: 'The generated production release version (e.g., v1.0.0)'
    value: ${{ steps.generate-release-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Generate Release Version
      id: generate-release-version
      uses: optivem/actions/generate-release-version@v1
      with:
        prerelease-version: ${{ inputs.version }}

    - name: Tag Docker Images
      id: tag-images
      uses: optivem/actions/tag-docker-images@v1
      with:
        image-urls: ${{ inputs.artifact-urls }}
        tag: ${{ steps.generate-release-version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: Create Production Release
      id: create-release
      uses: optivem/actions/create-release@v1
      with:
        base-version: ${{ inputs.version }}
        release-version: ${{ steps.generate-release-version.outputs.version }}
        environment: prod
        status: deployed
        artifact-urls: ${{ steps.tag-images.outputs.image-urls }}
        is-prerelease: false
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: Tag Component Versions
      if: inputs.component-versions != ''
      shell: bash
      run: |
        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          component_name="${line%%:*}"
          version_file="${line#*:}"

          if [[ ! -f "$version_file" ]]; then
            echo "::warning::VERSION file not found: $version_file"
            continue
          fi

          version=$(cat "$version_file" | tr -d '[:space:]')
          component_tag="${component_name}-v${version}"

          if git tag -l "$component_tag" | grep -q "$component_tag"; then
            echo "Skipped $component_name: tag $component_tag already exists"
          else
            git tag "$component_tag"
            git push origin "$component_tag"
            echo "Created component tag: $component_tag"
          fi
        done <<< "${{ inputs.component-versions }}"

    - name: Bump Patch Versions
      shell: bash
      run: |
        released_version="${{ steps.generate-release-version.outputs.version }}"
        # Strip leading 'v' to match VERSION file contents
        target="${released_version#v}"

        bumped=false

        # Bump system VERSION files matching the released version
        for file in $(find . -name VERSION -not -path '*node_modules*' -not -path '*/.git/*'); do
          version=$(cat "$file" | tr -d '[:space:]')
          if [[ "$version" == "$target" ]]; then
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)
            new_version="${major}.${minor}.$((patch + 1))"
            echo "$new_version" > "$file"
            echo "Bumped $file: $version -> $new_version"
            bumped=true
          fi
        done

        # Bump component VERSION files that were just tagged
        COMPONENT_VERSIONS="${{ inputs.component-versions }}"
        if [[ -n "$COMPONENT_VERSIONS" ]]; then
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            version_file="${line#*:}"

            if [[ ! -f "$version_file" ]]; then
              continue
            fi

            version=$(cat "$version_file" | tr -d '[:space:]')
            # Skip if already bumped by the system bump above
            if [[ "$version" == "$target" ]]; then
              continue
            fi

            component_name="${line%%:*}"
            component_tag="${component_name}-v${version}"
            # Only bump if we just created the tag (version was released)
            if git tag -l "$component_tag" | grep -q "$component_tag"; then
              major=$(echo "$version" | cut -d. -f1)
              minor=$(echo "$version" | cut -d. -f2)
              patch=$(echo "$version" | cut -d. -f3)
              new_version="${major}.${minor}.$((patch + 1))"
              echo "$new_version" > "$version_file"
              echo "Bumped $version_file: $version -> $new_version"
              bumped=true
            fi
          done <<< "$COMPONENT_VERSIONS"
        fi

        if [[ "$bumped" == "true" ]]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bump patch versions after $released_version release"
          git push
        else
          echo "No VERSION files needed bumping."
        fi
