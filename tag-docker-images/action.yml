name: 'Tag Docker Images'
description: 'Tags Docker images with new tags for production releases and versioning workflows'
author: 'Optivem'
branding:
  icon: 'tag'
  color: 'blue'

inputs:
  image-urls:
    description: 'JSON array of source Docker image URLs with existing tags'
    required: true
  tag:
    description: 'Target tag to apply to images (e.g., v1.0.5, latest, production)'
    required: true
  registry:
    description: 'Container registry URL (e.g., ghcr.io, docker.io, gcr.io). Defaults to ghcr.io.'
    required: false
    default: 'ghcr.io'
  registry-username:
    description: 'Username for registry authentication'
    required: false
    default: '${{ github.actor }}'
  token:
    description: 'Token used to authenticate against the registry. Defaults to the workflow-scoped GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

outputs:
  image-urls:
    description: 'JSON array of Docker image URLs with new tags applied'
    value: ${{ steps.tag-images.outputs.image-urls }}

runs:
  using: 'composite'
  steps:
    - name: Log in to Container Registry
      run: |
        echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_TOKEN: ${{ inputs.token }}

    - name: Tag Docker Images
      id: tag-images
      shell: bash
      env:
        IMAGE_URLS: ${{ inputs.image-urls }}
        TARGET_TAG: ${{ inputs.tag }}
      run: bash "${{ github.action_path }}/tag-docker-images.sh"
