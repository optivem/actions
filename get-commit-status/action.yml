name: 'Get Commit Status'
description: 'Reads the most recent commit status with a given context (and optionally a required state) from a commit. Returns empty outputs if no matching status is found.'
inputs:
  commit-sha:
    description: 'Commit SHA to read the status from'
    required: true
  context:
    description: 'Status context to look up'
    required: true
  state:
    description: 'Required state filter (success, failure, pending, error). Empty = any state.'
    required: false
    default: 'success'
  repository:
    description: 'Repository in "owner/name" form. Default: current repository.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token used for API calls. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
outputs:
  description:
    description: 'The description field of the matched status'
    value: ${{ steps.read.outputs.description }}
  state:
    description: 'The state of the matched status'
    value: ${{ steps.read.outputs.state }}
  target-url:
    description: 'The target_url of the matched status'
    value: ${{ steps.read.outputs.target-url }}
runs:
  using: 'composite'
  steps:
    - id: read
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ inputs.repository }}
        SHA: ${{ inputs.commit-sha }}
        CONTEXT: ${{ inputs.context }}
        STATE_FILTER: ${{ inputs.state }}
      run: bash "$GITHUB_ACTION_PATH/read.sh"
