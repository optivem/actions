name: 'Trigger and Wait for Workflow'
description: 'Trigger a workflow_dispatch workflow, poll for completion, and fail if the triggered run fails. Includes GitHub API rate-limit protection and a hard timeout ceiling on the dispatched run.'
inputs:
  workflow:
    description: 'Workflow filename (e.g. monolith-java-commit-stage.yml) — matches `gh workflow run --workflow`'
    required: true
  repository:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  ref:
    description: 'Git ref to trigger the workflow on'
    required: false
    default: main
  workflow-inputs:
    description: 'JSON object of workflow inputs (e.g., {"version": "v1.0.0-rc.1"}). Named workflow-inputs rather than inputs to avoid shadowing the workflow inputs context at the caller site.'
    required: false
    default: '{}'
  poll-interval:
    description: 'Seconds between status polls (default: 120)'
    required: false
    default: '120'
  rate-limit-threshold:
    description: 'Pause when remaining API requests fall below this number (default: 50)'
    required: false
    default: '50'
  timeout-seconds:
    description: 'Hard timeout on the watch phase. The action fails with exit code 124 if the triggered run has not terminated within this many seconds. Default: 1800 (30 minutes) — aligned with fast-feedback sizing. Callers that trigger longer-running workflows (acceptance/qa pipelines, full prerelease cascades) must override upward.'
    required: false
    default: '1800'
  token:
    description: 'GitHub token used to dispatch and watch the workflow run. Callers may pass a higher-scoped token (e.g. a PAT) when cross-repo workflow_dispatch is required. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
outputs:
  run-id:
    description: 'The database ID of the triggered workflow run'
    value: ${{ steps.trigger.outputs.run_id }}

runs:
  using: 'composite'
  steps:
    - name: Trigger ${{ inputs.workflow }}
      id: trigger
      env:
        GH_TOKEN: ${{ inputs.token }}
        WORKFLOW: ${{ inputs.workflow }}
        REPOSITORY: ${{ inputs.repository }}
        REF: ${{ inputs.ref }}
        INPUTS_JSON: ${{ inputs.workflow-inputs }}
        RATE_LIMIT_THRESHOLD: ${{ inputs.rate-limit-threshold }}
      shell: bash
      run: |
        source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"

        # --- Rate limit check (skip retry wrapper — local probe) ---
        remaining=$(gh api rate_limit --jq ".resources.core.remaining" 2>/dev/null || echo "999")
        if [ "$remaining" -lt "$RATE_LIMIT_THRESHOLD" ]; then
          reset=$(gh api rate_limit --jq ".resources.core.reset" 2>/dev/null || echo "0")
          wait=$(( reset - $(date +%s) + 5 ))
          if [ "$wait" -gt 0 ]; then
            echo "::warning::Rate limit low ($remaining remaining). Waiting ${wait}s for reset..."
            sleep "$wait"
          fi
        fi

        # --- Build input flags ---
        input_flags=""
        if [ "$INPUTS_JSON" != "{}" ] && [ -n "$INPUTS_JSON" ]; then
          input_flags=$(echo "$INPUTS_JSON" | jq -r 'to_entries[] | "-f \(.key)=\(.value)"' | tr '\n' ' ')
        fi

        # --- Trigger workflow ---
        # Wrap dispatch in `timeout` so a hanging TCP/TLS call fails fast with a
        # diagnostic instead of stalling silently up to the job timeout. The
        # notice breadcrumbs bracket the call so a future silent exit has a
        # traceable last-known-good point in the log.
        echo "::notice::Dispatching $WORKFLOW to $REPOSITORY@$REF..."
        set +e
        timeout 60 bash -c '
          source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"
          gh_retry workflow run "$WORKFLOW" \
            --repo "$REPOSITORY" \
            --ref "$REF" \
            '"$input_flags"'
        '
        code=$?
        set -e
        if [ "$code" -eq 124 ]; then
          echo "::error::Dispatch of $WORKFLOW exceeded 60s — gh workflow run hung on network I/O. The run may still have been created server-side; check $REPOSITORY actions for a recent run."
          exit "$code"
        fi
        if [ "$code" -ne 0 ]; then
          echo "::error::Dispatch of $WORKFLOW failed (exit $code)."
          exit "$code"
        fi
        echo "::notice::Dispatched $WORKFLOW"
        sleep 10

        # --- Capture run ID ---
        run_id=$(timeout 60 bash -c '
          source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"
          gh_retry run list \
            --workflow="$WORKFLOW" \
            --repo "$REPOSITORY" \
            --branch "$REF" \
            --limit 1 --json databaseId --jq ".[0].databaseId"
        ')
        echo "run_id=$run_id" >> $GITHUB_OUTPUT

    - name: Wait for ${{ inputs.workflow }}
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPOSITORY: ${{ inputs.repository }}
        POLL_INTERVAL: ${{ inputs.poll-interval }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        RUN_ID: ${{ steps.trigger.outputs.run_id }}
        WORKFLOW: ${{ inputs.workflow }}
      shell: bash
      run: |
        echo "Waiting for run $RUN_ID (timeout: ${TIMEOUT_SECONDS}s)..."
        set +e
        timeout "$TIMEOUT_SECONDS" bash -c '
          source "$GITHUB_ACTION_PATH/../shared/gh-retry.sh"
          gh_retry run watch "$RUN_ID" \
            --repo "$REPOSITORY" \
            --exit-status \
            --interval "$POLL_INTERVAL"
        '
        code=$?
        set -e
        if [ "$code" -eq 124 ]; then
          echo "::error::Workflow $WORKFLOW (run $RUN_ID) exceeded timeout of ${TIMEOUT_SECONDS}s. The upstream run may still be in progress — check manually before retrying."
        fi
        exit "$code"
