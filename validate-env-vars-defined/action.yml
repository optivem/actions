name: 'Validate Env Vars Defined'
description: 'Validates that required variables and secrets are defined before workflow execution. List the names in the names input and pass the values via env.'

inputs:
  names:
    description: 'Newline-separated list of environment variable names to validate. Leading/trailing whitespace on each name is trimmed; blank lines are ignored.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Ensure Environment Variables Defined
      run: bash "$GITHUB_ACTION_PATH/validate.sh"
      shell: bash
      env:
        VALIDATE_NAMES: ${{ inputs.names }}
