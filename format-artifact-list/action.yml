name: 'Format Artifact List'
description: 'Formats a newline-separated list of artifact identifiers (image URLs, release URLs, arbitrary strings) into a bulleted markdown list. Pure string transform — no side effects.'
author: 'Optivem'
branding:
  icon: 'list'
  color: 'blue'

inputs:
  artifacts:
    description: 'Newline-separated artifact identifiers, e.g. a single "docker.io/app:v1" or multiple entries via a multiline YAML string. Empty string returns empty output.'
    required: false
    default: ''

outputs:
  formatted:
    description: 'Bulleted markdown list (one "• <item>" per line). Empty string if no artifacts provided.'
    value: ${{ steps.format.outputs.formatted }}

runs:
  using: 'composite'
  steps:
    - id: format
      shell: bash
      env:
        ARTIFACTS: ${{ inputs.artifacts }}
      run: |
        set -euo pipefail
        echo "🔧 Formatting artifact list..."

        formatted="$(printf '%s\n' "$ARTIFACTS" \
          | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
          | sed '/^$/d' \
          | sed 's/^/• /')"

        if [[ -n "$formatted" ]]; then
          echo "📋 Formatted output:"
          echo "$formatted"
        else
          echo "ℹ️ No artifacts provided; returning empty output"
        fi

        {
          echo "formatted<<EOF"
          echo "$formatted"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        echo "✅ Output written to GITHUB_OUTPUT"
