name: 'Format Artifact List'
description: 'Formats a JSON array of artifact identifiers (image URLs, release URLs, arbitrary strings) into a bulleted markdown list. Pure string transform — no side effects.'
author: 'Optivem'
branding:
  icon: 'list'
  color: 'blue'

inputs:
  artifacts:
    description: 'JSON array of artifact identifiers, e.g. ["docker.io/app:v1"] or ["url1","url2"]. Empty string returns empty output.'
    required: false
    default: ''

outputs:
  formatted:
    description: 'Bulleted markdown list (one "• <item>" per line). Empty string if no artifacts provided.'
    value: ${{ steps.format.outputs.formatted }}

runs:
  using: 'composite'
  steps:
    - id: format
      shell: bash
      env:
        ARTIFACTS: ${{ inputs.artifacts }}
      run: |
        set -euo pipefail
        echo "🔧 Formatting artifact list..."

        formatted=""
        trimmed="$(printf '%s' "$ARTIFACTS" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

        if [[ -n "$trimmed" ]]; then
          echo "📦 Input received: $ARTIFACTS"
          if ! items="$(jq -r 'if type == "array" then .[] else . end' <<<"$trimmed" 2>/dev/null)"; then
            echo "::error::Invalid JSON array format. Expected [\"value\"] or [\"v1\",\"v2\"]."
            exit 1
          fi
          formatted="$(printf '%s\n' "$items" | sed '/^$/d' | sed 's/^/• /')"
          echo "📋 Formatted output:"
          echo "$formatted"
        else
          echo "ℹ️ No artifacts provided; returning empty output"
        fi

        {
          echo "formatted<<EOF"
          echo "$formatted"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        echo "✅ Output written to GITHUB_OUTPUT"
