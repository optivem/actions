name: 'Validate Tag Exists'
description: 'Asserts that a git tag exists in the repository; fails the step if it does not. Tool-agnostic — uses git ls-remote, no platform API dependency.'

inputs:
  tag:
    description: 'Git tag to require (e.g., meta-v1.0.0-rc.1, monolith-java-v1.0.0)'
    required: true
  repository:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'Token for authenticating to the remote'
    required: false
    default: ${{ github.token }}
  git-host:
    description: 'Git host to query (e.g. github.com, gitlab.com, codeberg.org). Defaults to github.com.'
    required: false
    default: 'github.com'

runs:
  using: 'composite'
  steps:
    - name: Ensure tag exists
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
        REPO: ${{ inputs.repository }}
        TOKEN: ${{ inputs.token }}
        GIT_HOST: ${{ inputs.git-host }}
      run: bash "$GITHUB_ACTION_PATH/validate.sh"
